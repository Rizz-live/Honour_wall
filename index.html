<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Live — Weekly Honours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03020d;
  --surface:#07060f;
  --card:#0c0b1a;
  --card2:#100f20;
  --border:#ffffff0c;
  --border2:#ffffff18;
  --orange:#ff5c1a;
  --orange2:#ff8c42;
  --gold:#f5c842;
  --gold2:#ffe98a;
  --silver:#b8bdd4;
  --silver2:#dde0f0;
  --bronze:#c07c38;
  --bronze2:#e8a85a;
  --pink:#f03e6e;
  --cyan:#00d4ff;
  --text:#e8e8f0;
  --muted:#4a4a6a;
  --muted2:#6a6a8a;
  --glow1:#ff5c1a30;
  --glow2:#f03e6e20;
}

html,body{background:var(--bg);min-height:100vh;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;color:var(--text);cursor:default}

/* ─── NOISE OVERLAY ───────────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;
}

/* ─── INTRO ──────────────────────────────────────────────────── */
#intro{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a0535 0%,#06041a 50%,#03020d 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .8s cubic-bezier(.4,0,.2,1), transform .8s cubic-bezier(.4,0,.2,1);
}
#intro.out{opacity:0;transform:scale(1.04) translateY(-10px);pointer-events:none}

/* Stars */
.star-field{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{
  position:absolute;border-radius:50%;background:#fff;
  animation:st var(--d,3s) var(--delay,0s) infinite alternate ease-in-out;
}
@keyframes st{0%{opacity:.05;transform:scale(.6)}100%{opacity:.9;transform:scale(1)}}

/* Intro ring */
.intro-ring-wrap{position:relative;margin-bottom:28px}
.intro-ring-outer{
  width:130px;height:130px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.ring-rotate{
  position:absolute;inset:-3px;border-radius:50%;
  border:1.5px solid transparent;
  border-top-color:#ff5c1a;border-right-color:#f03e6e;
  animation:spin 3s linear infinite;
}
.ring-rotate2{
  position:absolute;inset:-8px;border-radius:50%;
  border:1px solid transparent;
  border-bottom-color:#ff5c1a60;border-left-color:#f03e6e40;
  animation:spin 6s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}

.intro-logo-circle{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(140deg,#1e0a3e,#2a0a2a);
  border:2px solid #ffffff10;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 0 50px #ff5c1a20,0 0 100px #f03e6e10,inset 0 1px 0 #ffffff10;
}
.intro-logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.intro-logo-txt{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  color:#fff;letter-spacing:3px;text-align:center;line-height:1.4;
}

/* Intro glow blobs */
.blob{
  position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;
  animation:blobAnim 6s ease-in-out infinite alternate;
}
.blob1{width:300px;height:300px;top:-100px;left:-80px;background:#ff5c1a0d;animation-delay:0s}
.blob2{width:250px;height:250px;bottom:-60px;right:-60px;background:#f03e6e0d;animation-delay:-3s}
@keyframes blobAnim{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.2) translate(10px,-10px)}}

.intro-eyebrow{
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:5px;text-transform:uppercase;color:var(--muted2);
  margin-bottom:10px;
}
.intro-title{
  font-family:'Syne',sans-serif;font-size:42px;font-weight:800;
  color:#fff;letter-spacing:2px;line-height:1;margin-bottom:4px;
  text-shadow:0 0 60px #ff5c1a40;
}
.intro-title span{
  background:linear-gradient(90deg,#ff5c1a,#f5c842,#f03e6e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200%;animation:grad 4s linear infinite;
}
@keyframes grad{0%{background-position:0%}100%{background-position:200%}}
.intro-sub{font-size:11px;color:var(--muted2);letter-spacing:4px;margin-bottom:18px}

.intro-india{
  display:flex;align-items:center;gap:8px;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;
  color:#ffffff90;letter-spacing:3px;margin-bottom:18px;
}
.flag-mini{display:flex;flex-direction:column;gap:1px;width:18px;border-radius:2px;overflow:hidden}
.fm{height:4px;width:100%}

.intro-live-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(90deg,#f03e6e15,#ff5c1a15);
  border:1px solid #f03e6e40;
  color:#f87da0;font-size:10px;font-weight:600;
  padding:6px 18px;border-radius:30px;letter-spacing:3px;
  margin-bottom:24px;
  box-shadow:0 0 20px #f03e6e10;
}
.live-dot-pulse{
  width:7px;height:7px;border-radius:50%;background:#f03e6e;
  box-shadow:0 0 6px #f03e6e;
  animation:lp 1.2s ease-in-out infinite;
}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

.intro-count{
  font-family:'Syne',sans-serif;font-size:72px;font-weight:800;
  color:var(--orange);line-height:1;
  text-shadow:0 0 30px #ff5c1a60,0 0 60px #ff5c1a20;
  animation:cpop .4s cubic-bezier(.17,.67,.3,1.3);
}
@keyframes cpop{0%{transform:scale(1.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* ─── MAIN ──────────────────────────────────────────────────── */
#main{
  display:none;width:100%;max-width:540px;margin:0 auto;
  min-height:100vh;position:relative;z-index:1;
}

/* Ambient background gradient */
#main::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 100% 50% at 50% -10%,#1a0530 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,#1a0520 0%,transparent 50%),
    var(--bg);
}

/* ─── HEADER ──────────────────────────────────────────────────── */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:linear-gradient(180deg,#07060f 0%,#07060faa 100%);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
}

.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{
  width:38px;height:38px;border-radius:12px;overflow:hidden;
  border:1px solid #ffffff15;background:#100f20;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hdr-logo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.hdr-logo-txt{font-family:'Syne',sans-serif;font-size:7px;font-weight:800;color:#fff;letter-spacing:1.5px;text-align:center;line-height:1.3}
.hdr-brand{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;letter-spacing:.5px;line-height:1}
.hdr-region{font-size:9px;color:var(--muted2);letter-spacing:3px;text-transform:uppercase;margin-top:1px}

.hdr-center-text{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:500;
  color:var(--muted2);letter-spacing:2px;text-align:center;text-transform:uppercase;
}

.hdr-badge{
  display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#f03e6e15,#ff5c1a15);
  border:1px solid #ff5c1a35;
  padding:5px 12px;border-radius:20px;
}
.hdr-badge-dot{width:5px;height:5px;border-radius:50%;background:#ff5c1a;animation:lp 1s infinite}
.hdr-badge-txt{font-size:9px;font-weight:600;color:#ff8a5a;letter-spacing:2px}

/* ─── SECTIONS ─────────────────────────────────────────────────── */
.sections-wrap{padding:8px 0 60px}

.section-block{
  padding:0 0 6px;
  opacity:0;transform:translateY(28px);
  transition:opacity .55s cubic-bezier(.4,0,.2,1), transform .55s cubic-bezier(.4,0,.2,1);
}
.section-block.visible{opacity:1;transform:translateY(0)}

/* Section header */
.sec-header{padding:28px 20px 8px;text-align:center}
.sec-emoji-wrap{
  display:inline-flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg,#ffffff06,#ffffff03);
  border:1px solid var(--border2);
  font-size:20px;margin-bottom:12px;
  box-shadow:0 4px 16px #00000040;
}
.sec-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  color:#fff;letter-spacing:.5px;margin-bottom:4px;
}
.sec-week{
  font-size:9px;color:var(--muted);letter-spacing:3px;
  text-transform:uppercase;
}

/* Top 3 row */
.top3-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:10px;padding:12px 12px 20px;
}

/* ─── CARDS ─────────────────────────────────────────────────── */
.top-card{
  flex:1;max-width:155px;
  border-radius:22px;padding:0 0 14px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
  border:1px solid var(--border);
  transition:transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s;
  cursor:default;
}
.top-card:active{transform:scale(.97) translateY(2px)!important}

/* Card inner glow */
.top-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(160deg,var(--card-glow1,transparent) 0%,transparent 50%);
  border-radius:22px;
}

.top-card.rank1{
  --card-glow1:#ffd70012;
  background:linear-gradient(170deg,#17123a 0%,#0f0c2a 60%,#0c0b1a 100%);
  border-color:#f5c84230;min-height:235px;
  box-shadow:0 8px 40px #ffd70010,0 0 0 1px #f5c84218;
}
.top-card.rank2{
  --card-glow1:#b8bdd408;
  background:linear-gradient(170deg,#0f0e20 0%,#0c0b1a 100%);
  border-color:#b8bdd425;min-height:210px;
  box-shadow:0 4px 24px #00000040;
}
.top-card.rank3{
  --card-glow1:#c07c3808;
  background:linear-gradient(170deg,#120e1a 0%,#0c0b1a 100%);
  border-color:#c07c3825;min-height:210px;
  box-shadow:0 4px 24px #00000040;
}

/* Shine bar at top */
.card-shine{
  width:100%;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--shine-color,#fff3) 50%,transparent 100%);
  margin-bottom:0;
}
.rank1 .card-shine{--shine-color:#f5c84280}
.rank2 .card-shine{--shine-color:#b8bdd460}
.rank3 .card-shine{--shine-color:#c07c3860}

/* Crown for #1 */
.rank1::after{
  content:'👑';
  position:absolute;top:8px;right:10px;font-size:14px;
  filter:drop-shadow(0 0 4px #ffd700a0);
  animation:crownFloat 3s ease-in-out infinite;
}
@keyframes crownFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* Rank badge */
.rank-badge{
  position:absolute;top:14px;left:14px;
  width:24px;height:24px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
}
.rank1 .rank-badge{background:linear-gradient(135deg,#f5c842,#d4980a);color:#1a0a00;box-shadow:0 2px 8px #f5c84250}
.rank2 .rank-badge{background:linear-gradient(135deg,#d4d4e0,#8a8aaa);color:#0a0a1a;box-shadow:0 2px 8px #b8bdd430}
.rank3 .rank-badge{background:linear-gradient(135deg,#c07c38,#8a4a10);color:#fff;box-shadow:0 2px 8px #c07c3830}

/* DP */
.dp-outer{
  position:relative;margin:22px auto 14px;
  display:flex;align-items:center;justify-content:center;
}
.dp-outer.sz-big{width:80px;height:80px}
.dp-outer.sz-sm{width:66px;height:66px}

.dp-ring{
  position:absolute;inset:-6px;border-radius:50%;
  background:conic-gradient(var(--ring-a,#f5c842) 0%,transparent 25%,var(--ring-b,#d4980a) 50%,transparent 75%,var(--ring-a,#f5c842) 100%);
  animation:spin 6s linear infinite;
  padding:1.5px;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2px),#fff calc(100% - 1.5px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 2px),#fff calc(100% - 1.5px));
}
.rank1 .dp-ring{--ring-a:#f5c842;--ring-b:#ff5c1a}
.rank2 .dp-ring{--ring-a:#b8bdd4;--ring-b:#d4d8f0;animation-duration:8s}
.rank3 .dp-ring{--ring-a:#c07c38;--ring-b:#e8a85a;animation-duration:10s}

.dp-img{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#1e1a3a,#12103a);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--muted);text-align:center;
}
.dp-img img{width:100%;height:100%;object-fit:cover}

/* Medal */
.medal-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  font-size:9px;font-weight:600;letter-spacing:1px;
  margin-bottom:10px;
}
.rank1 .medal-chip{background:#f5c84215;border:1px solid #f5c84240;color:var(--gold2)}
.rank2 .medal-chip{background:#b8bdd415;border:1px solid #b8bdd430;color:var(--silver2)}
.rank3 .medal-chip{background:#c07c3815;border:1px solid #c07c3830;color:var(--bronze2)}

/* Name */
.card-name{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  color:#fff;text-align:center;line-height:1.3;
  padding:0 10px;margin-bottom:12px;word-break:break-word;
}
.rank1 .card-name{font-size:14px}

/* Stat chip */
.stat-chip{
  width:calc(100% - 20px);
  display:flex;align-items:center;gap:7px;
  background:#ffffff06;border:1px solid var(--border2);
  border-radius:12px;padding:7px 10px;
}
.stat-icon-wrap{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.rank1 .stat-icon-wrap{background:#f5c84210}
.rank2 .stat-icon-wrap{background:#b8bdd410}
.rank3 .stat-icon-wrap{background:#c07c3810}

.stat-right{display:flex;flex-direction:column;min-width:0}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:.5px;font-weight:500;white-space:nowrap}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Section divider */
.sec-divider{
  display:flex;align-items:center;gap:12px;
  margin:0 20px;padding:4px 0;
}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.divider-dot{width:4px;height:4px;border-radius:50%;background:var(--border2);flex-shrink:0}

/* ─── LOADING ───────────────────────────────────────────────── */
#loading-state{
  display:flex;flex-direction:column;align-items:center;
  padding:80px 20px;gap:14px;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--border2);border-top-color:var(--orange);
  animation:spin .9s linear infinite;
}
.loading-label{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

/* ─── FOOTER ───────────────────────────────────────────────── */
.page-footer{
  text-align:center;padding:24px 16px 40px;
  border-top:1px solid var(--border);
}
.footer-brand{
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;
}
.footer-flag{display:flex;align-items:center;justify-content:center;gap:2px;margin-bottom:8px}
.ff{height:4px;width:22px;border-radius:1px}
.footer-copy{font-size:9px;color:var(--muted);letter-spacing:1px}

/* ─── SCROLL FADE ──────────────────────────────────────────── */
@media (prefers-reduced-motion:no-preference){
  .top-card.rank1{animation:cardEntrance .6s .1s both cubic-bezier(.17,.67,.3,1.1)}
  .top-card.rank2{animation:cardEntrance .6s .2s both cubic-bezier(.17,.67,.3,1.1)}
  .top-card.rank3{animation:cardEntrance .6s .3s both cubic-bezier(.17,.67,.3,1.1)}
  @keyframes cardEntrance{
    0%{opacity:0;transform:translateY(20px) scale(.96)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
}
</style>
</head>
<body>

<!-- ═══ INTRO ══════════════════════════════════════════════════ -->
<div id="intro">
  <div class="star-field" id="starfield"></div>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="intro-ring-wrap">
    <div class="intro-ring-outer">
      <div class="ring-rotate2"></div>
      <div class="ring-rotate"></div>
      <div class="intro-logo-circle" id="intro-logo">
        <div class="intro-logo-txt">RIZZ<br>LIVE</div>
      </div>
    </div>
  </div>

  <div class="intro-eyebrow">Weekly Honour Wall</div>
  <div class="intro-title">RIZZ <span>LIVE</span></div>
  <div class="intro-sub">Weekly Honours · India</div>

  <div class="intro-india">
    <div class="flag-mini">
      <div class="fm" style="background:#ff9933"></div>
      <div class="fm" style="background:#fff"></div>
      <div class="fm" style="background:#138808"></div>
    </div>
    INDIA
    <div class="flag-mini">
      <div class="fm" style="background:#ff9933"></div>
      <div class="fm" style="background:#fff"></div>
      <div class="fm" style="background:#138808"></div>
    </div>
  </div>

  <div class="intro-live-pill">
    <span class="live-dot-pulse"></span>LIVE NOW
  </div>

  <div class="intro-count" id="countdown">3</div>
</div>

<!-- ═══ MAIN ════════════════════════════════════════════════════ -->
<div id="main">

  <!-- Header -->
  <div class="page-header">
    <div class="hdr-left">
      <div class="hdr-logo" id="hdr-logo">
        <div class="hdr-logo-txt">RIZZ<br>LIVE</div>
      </div>
      <div>
        <div class="hdr-brand">Rizz Live</div>
        <div class="hdr-region">🇮🇳 India</div>
      </div>
    </div>
    <div class="hdr-center-text">Weekly<br>Honours</div>
    <div class="hdr-badge">
      <span class="hdr-badge-dot"></span>
      <span class="hdr-badge-txt">LIVE</span>
    </div>
  </div>

  <!-- Sections -->
  <div class="sections-wrap" id="sections-container">
    <div id="loading-state">
      <div class="spinner"></div>
      <div class="loading-label">Loading data…</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="page-footer">
    <div class="footer-brand">Rizz Live · India · Weekly Honours</div>
    <div class="footer-flag">
      <div class="ff" style="background:#ff9933"></div>
      <div class="ff" style="background:#fff"></div>
      <div class="ff" style="background:#138808"></div>
    </div>
    <div class="footer-copy">© 2025 Rizz Live India</div>
  </div>

</div>

<script>
// ═══════════════ CONFIG ═══════════════════════════════════════
const SECTIONS_CONFIG = [
  { key:'agency',     emoji:'🏆', title:'Top 3 Agency',       defaultWeek:'Week 1st',                    stat:{label:'Ruby Target',  icon:'ruby',  color:'#f87da0'} },
  { key:'host',       emoji:'🎤', title:'Top 3 Host',          defaultWeek:'Week 1st',                    stat:{label:'Ruby Target',  icon:'ruby',  color:'#f87da0'} },
  { key:'recharger',  emoji:'💰', title:'Top 3 Recharger',     defaultWeek:'Week 1st',                    stat:{label:'Weekly Recharge',icon:'coin', color:'#f5c842'} },
  { key:'gifter',     emoji:'🎁', title:'Top 3 Gifter',        defaultWeek:'Week 1st',                    stat:{label:'Ruby',         icon:'ruby',  color:'#f87da0'} },
  { key:'activehost', emoji:'🔴', title:'Top 3 Active Host',   defaultWeek:'Sabse Zyada Live Time',       stat:{label:'Live Time',    icon:'clock', color:'#00d4ff'} },
  { key:'newagency',  emoji:'🌟', title:'New Top 3 Agency',    defaultWeek:'Naye Agency — Week 1st',      stat:{label:'Ruby Target',  icon:'ruby',  color:'#f87da0'} },
  { key:'agencytime', emoji:'⏱',  title:'Top 3 Agency App Time',defaultWeek:'Sabse Zyada App Par Samay', stat:{label:'App Time',     icon:'clock', color:'#00d4ff'} },
];

const RANK_META = {
  1:{medal:'🥇 GOLD',  sz:'big',order:2},
  2:{medal:'🥈 SILVER',sz:'sm', order:1},
  3:{medal:'🥉 BRONZE',sz:'sm', order:3},
};
const DISPLAY_ORDER = [2,1,3];

// ═══════════════ SVG ICONS ═══════════════════════════════════
function rubySVG(s=16){return`<svg width="${s}" height="${s}" viewBox="0 0 24 24"><defs><linearGradient id="rg${s}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff2060"/><stop offset="50%" stop-color="#f87da0"/><stop offset="100%" stop-color="#8b0030"/></linearGradient></defs><polygon points="12,1 21,8 12,23 3,8" fill="url(#rg${s})"/><polygon points="12,1 17,8 12,6.5 7,8" fill="#ffaac5" opacity=".6"/><polygon points="7,8 12,6.5 17,8 12,23" fill="#8b0030" opacity=".4"/></svg>`}
function coinSVG(s=16){return`<svg width="${s}" height="${s}" viewBox="0 0 24 24"><defs><radialGradient id="cg${s}" cx="35%" cy="30%"><stop offset="0%" stop-color="#fff0a0"/><stop offset="55%" stop-color="#f5c842"/><stop offset="100%" stop-color="#8a6000"/></radialGradient></defs><circle cx="12" cy="12" r="10.5" fill="url(#cg${s})"/><circle cx="12" cy="12" r="8.5" fill="none" stroke="#ffe98a" stroke-width=".8" opacity=".5"/><text x="12" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#7a5000" font-family="serif">₹</text></svg>`}
function clockSVG(s=16){return`<svg width="${s}" height="${s}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".7"/><circle cx="12" cy="12" r="1.5" fill="#00d4ff"/><line x1="12" y1="12" x2="12" y2="5.5" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="12" x2="16" y2="14" stroke="#00b8d4" stroke-width="1.2" stroke-linecap="round"/></svg>`}
function getIcon(t,s=15){return t==='ruby'?rubySVG(s):t==='coin'?coinSVG(s):t==='clock'?clockSVG(s):''}

// ═══════════════ BUILD CARD ═══════════════════════════════════
function buildCard(cfg, rank, data){
  const rm = RANK_META[rank];
  const d  = data||{};
  const name= d.name||'— — —', stat= d.stat||'—', dp= d.dp||'', frame= d.frame||'';

  const card = document.createElement('div');
  card.className = `top-card rank${rank}`;
  card.dataset.key = cfg.key; card.dataset.rank = rank;

  const dpInner = dp
    ? `<img src="${dp}" alt="${esc(name)}" onerror="this.style.display='none'">`
    : `<span style="font-size:10px;color:#333;padding:4px">DP</span>`;

  card.innerHTML = `
    <div class="card-shine"></div>
    <div class="rank-badge">${rank}</div>
    <div class="dp-outer sz-${rm.sz}">
      <div class="dp-ring"></div>
      <div class="dp-img">${dpInner}</div>
    </div>
    <div class="medal-chip">${rm.medal}</div>
    <div class="card-name">${esc(name)}</div>
    <div class="stat-chip">
      <div class="stat-icon-wrap">${getIcon(cfg.stat.icon,15)}</div>
      <div class="stat-right">
        <span class="stat-lbl">${cfg.stat.label}</span>
        <span class="stat-val" style="color:${cfg.stat.color}">${esc(stat)}</span>
      </div>
    </div>`;
  return card;
}

// ═══════════════ BUILD SECTION ════════════════════════════════
function buildSection(cfg, secData){
  const week = secData?.week || cfg.defaultWeek;
  const block = document.createElement('div');
  block.className = 'section-block';

  const hdr = document.createElement('div');
  hdr.className = 'sec-header';
  hdr.innerHTML = `
    <div class="sec-emoji-wrap">${cfg.emoji}</div>
    <div class="sec-title">${cfg.title}</div>
    <div class="sec-week">${esc(week)}</div>`;
  block.appendChild(hdr);

  const row = document.createElement('div');
  row.className = 'top3-row';
  DISPLAY_ORDER.forEach(rank => {
    const rd = secData?.ranks ? secData.ranks[rank] : null;
    row.appendChild(buildCard(cfg, rank, rd));
  });
  block.appendChild(row);

  const divider = document.createElement('div');
  divider.className = 'sec-divider';
  divider.innerHTML = `<div class="divider-line"></div><span class="divider-dot"></span><div class="divider-line"></div>`;
  block.appendChild(divider);

  return block;
}

// ═══════════════ RENDER ═══════════════════════════════════════
function renderSections(data){
  const c = document.getElementById('sections-container');
  c.innerHTML = '';
  SECTIONS_CONFIG.forEach((cfg, i) => {
    const secData = data?.sections?.[cfg.key] || null;
    const block = buildSection(cfg, secData);
    c.appendChild(block);
    setTimeout(() => block.classList.add('visible'), 90 * i);
  });
}

function applyLogo(src){
  if(!src) return;
  const il = document.getElementById('intro-logo');
  if(il) il.innerHTML = `<img src="${src}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  const hl = document.getElementById('hdr-logo');
  if(hl) hl.innerHTML = `<img src="${src}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
}

// ═══════════════ LOAD DATA ════════════════════════════════════
async function loadData(){
  let data = null;
  try {
    const res = await fetch('./rizz-data.json?v='+Date.now());
    if(res.ok){
      const t = await res.text();
      if(t && t.trim()!=='' && t.trim()!=='{}') data = JSON.parse(t);
    }
  } catch(e){}
  if(data?.logo) applyLogo(data.logo);
  else { const img=new Image(); img.onload=()=>applyLogo(img.src); img.src='./images/app_logo.png'; }
  renderSections(data);
}

// ═══════════════ STARFIELD ════════════════════════════════════
(function(){
  const sf = document.getElementById('starfield');
  for(let i=0;i<100;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2+0.3;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*2.5}s;--delay:${Math.random()*4}s;opacity:${Math.random()*.4}`;
    sf.appendChild(s);
  }
})();

// ═══════════════ COUNTDOWN ════════════════════════════════════
let n=3;
const cd = document.getElementById('countdown');
const iv = setInterval(()=>{
  n--;
  if(n<=0){
    clearInterval(iv);
    cd.textContent='🔥';
    setTimeout(()=>{
      const intro=document.getElementById('intro');
      const main=document.getElementById('main');
      intro.classList.add('out');
      setTimeout(()=>{intro.style.display='none';main.style.display='block';loadData()},800);
    },500);
  } else {
    cd.textContent=n;
    cd.style.animation='none';void cd.offsetWidth;cd.style.animation='cpop .4s cubic-bezier(.17,.67,.3,1.3)';
  }
},1000);

// ═══════════════ UTILS ════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
