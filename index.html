<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Live — Weekly Honours</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06061a;
  --bg2:#0d0d28;
  --card:#10102a;
  --border:#ffffff15;
  --orange:#ff6b35;
  --gold:#ffd700;
  --silver:#c8c8d4;
  --bronze:#cd8540;
  --pink:#ff4d80;
  --cyan:#00e5ff;
  --text:#f0f0f0;
  --muted:#7a7a9a;
}

html,body{background:var(--bg);min-height:100vh}
body{font-family:'Poppins',sans-serif;color:var(--text);overflow-x:hidden}

/* ─── INTRO ─────────────────────────────────────────────────── */
#intro{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at 50% 30%,#1e0a4e 0%,#0a0a2a 60%,#06061a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .7s ease, transform .7s ease;
}
#intro.out{opacity:0;transform:scale(1.06);pointer-events:none}

.starfield{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--dur,2s) infinite alternate;
  animation-delay:var(--delay,0s);
}
@keyframes twinkle{0%{opacity:.1;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}

.intro-glow{
  position:absolute;width:400px;height:400px;
  background:radial-gradient(circle,#ff6b3520 0%,transparent 70%);
  border-radius:50%;animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.3);opacity:1}}

.intro-logo-ring{
  width:120px;height:120px;border-radius:50%;
  border:3px solid var(--orange);
  background:linear-gradient(135deg,#1a0a3e,#2d0a1e);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:22px;overflow:hidden;position:relative;z-index:1;
  box-shadow:0 0 40px #ff6b3560,0 0 80px #ff6b3520,inset 0 0 20px #ff6b3510;
  animation:introPulse 2s ease-in-out infinite;
}
@keyframes introPulse{
  0%,100%{box-shadow:0 0 40px #ff6b3560,0 0 80px #ff6b3520}
  50%{box-shadow:0 0 60px #ff6b35aa,0 0 120px #ff6b3540}
}
.intro-logo-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.intro-logo-fallback{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  color:#fff;text-align:center;line-height:1.3;letter-spacing:2px;
}

.intro-title{
  font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;
  background:linear-gradient(90deg,#ff6b35,#ffb347,#ff4d80,#ff6b35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:300%;letter-spacing:3px;margin-bottom:6px;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}

.intro-sub{font-size:12px;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-bottom:14px}
.intro-india{font-size:15px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:12px}

.live-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(90deg,#e0004dcc,#ff4d80cc);
  color:#fff;font-size:11px;font-weight:700;padding:5px 18px;
  border-radius:20px;letter-spacing:2px;
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(.98)}}
.live-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:livePulse 1s infinite}

.countdown{
  font-family:'Orbitron',sans-serif;font-size:56px;font-weight:900;
  color:#ff6b35;margin-top:24px;
  text-shadow:0 0 20px #ff6b3580,0 0 40px #ff6b3540;
  animation:countPop .5s ease;
}
@keyframes countPop{0%{transform:scale(1.4);opacity:0}100%{transform:scale(1);opacity:1}}

/* ─── MAIN ──────────────────────────────────────────────────── */
#main{
  display:none;width:100%;max-width:520px;margin:0 auto;
  background:linear-gradient(170deg,#06061a 0%,#0d0820 40%,#1a0610 100%);
  min-height:100vh;
}

/* HEADER */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;
  background:linear-gradient(90deg,#0d0d28,#1a0a3e,#0d0d28);
  border-bottom:1px solid #ff6b3520;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);
}
.hdr-logo-ring{
  width:42px;height:42px;border-radius:50%;
  border:2px solid var(--orange);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#1a0a3e;flex-shrink:0;
}
.hdr-logo-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hdr-logo-fallback{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:900;color:#fff;text-align:center;line-height:1.2}
.hdr-brand{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:var(--orange)}
.hdr-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.hdr-center{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#fff;letter-spacing:2px;text-align:center}
.hdr-live{
  display:flex;align-items:center;gap:5px;
  background:#e0004d18;border:1px solid #e0004d55;
  color:#ff4d80;font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:12px;letter-spacing:1px;
}
.hdr-live-dot{width:6px;height:6px;border-radius:50%;background:#e0004d;animation:livePulse 1s infinite}

/* SECTIONS */
.sections-wrap{padding:0 0 40px}

.section-block{padding:0 0 8px}

.sec-header{
  text-align:center;padding:22px 16px 4px;
}
.sec-emoji{font-size:22px;margin-bottom:4px}
.sec-title{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;
}
.sec-week{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

/* TOP 3 ROW */
.top3-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:8px;padding:10px 10px 16px;
}

/* CARDS */
.top-card{
  display:flex;flex-direction:column;align-items:center;
  border-radius:16px;padding:18px 8px 14px;
  position:relative;flex:1;max-width:150px;
  border:1px solid transparent;
  transition:transform .2s;
}
.top-card:active{transform:scale(.97)}

.top-card.rank1{
  background:linear-gradient(160deg,#1e1040,#2d1555,#1e1040);
  border-color:#ffd700;min-height:220px;
  box-shadow:0 4px 24px #ffd70018,0 0 0 1px #ffd70030;
}
.top-card.rank2{
  background:linear-gradient(160deg,#10101e,#181830,#10101e);
  border-color:#c8c8d4;min-height:195px;
  box-shadow:0 4px 16px #c8c8d408;
}
.top-card.rank3{
  background:linear-gradient(160deg,#10101e,#1a1428,#10101e);
  border-color:#cd8540;min-height:195px;
  box-shadow:0 4px 16px #cd854008;
}

/* Rank Badge */
.rank-badge{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:12px;font-family:'Orbitron',sans-serif;
  box-shadow:0 2px 8px #00000060;
}
.rank1 .rank-badge{background:linear-gradient(135deg,#ffd700,#ffb300);color:#1a0a00}
.rank2 .rank-badge{background:linear-gradient(135deg,#d4d4e0,#a0a0b4);color:#0a0a1a}
.rank3 .rank-badge{background:linear-gradient(135deg,#cd8540,#a05c20);color:#1a0800}

/* Crown for rank 1 */
.rank1::before{
  content:'👑';position:absolute;top:-28px;left:50%;transform:translateX(-50%);
  font-size:18px;filter:drop-shadow(0 0 6px #ffd700aa);
}

/* DP */
.dp-wrapper{position:relative;margin:6px auto 8px;flex-shrink:0}
.dp-wrapper.sz-big{width:76px;height:76px}
.dp-wrapper.sz-sm{width:64px;height:64px}

.dp-circle{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#2a1a4a,#1a1a3a);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#555;text-align:center;
}
.dp-circle img{width:100%;height:100%;object-fit:cover}
.rank1 .dp-circle{border:3px solid var(--gold)}
.rank2 .dp-circle{border:2px solid var(--silver)}
.rank3 .dp-circle{border:2px solid var(--bronze)}

/* Frame */
.dp-frame-img{
  position:absolute;inset:-8px;
  width:calc(100% + 16px);height:calc(100% + 16px);
  pointer-events:none;object-fit:contain;
}
.dp-frame-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:1.5px dashed currentColor;opacity:.5;
  animation:spin 8s linear infinite;
}
.rank1 .dp-frame-ring{color:var(--gold)}
.rank2 .dp-frame-ring{color:var(--silver)}
.rank3 .dp-frame-ring{color:var(--bronze)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Medal label */
.medal-label{font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.rank1 .medal-label{color:var(--gold);font-size:12px}
.rank2 .medal-label{color:var(--silver)}
.rank3 .medal-label{color:var(--bronze)}

/* Name */
.card-name{
  font-size:12px;font-weight:700;color:#eee;text-align:center;
  margin-bottom:8px;word-break:break-word;max-width:130px;line-height:1.3;
}
.rank1 .card-name{font-size:13px;color:#fff}

/* Stat */
.stat-row{
  display:flex;align-items:center;gap:6px;
  background:#ffffff08;border-radius:10px;padding:5px 8px;
  border:1px solid #ffffff0a;width:100%;
}
.stat-icon{flex-shrink:0;display:flex}
.stat-text{display:flex;flex-direction:column;min-width:0;flex:1}
.stat-label{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:.5px;white-space:nowrap}
.stat-val{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank1 .stat-val{font-size:12px}

/* Divider */
.sec-divider{
  display:flex;align-items:center;gap:10px;
  margin:4px 20px;opacity:.5;
}
.sec-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#ff6b35,transparent)}

/* Footer */
.page-footer{
  text-align:center;padding:20px 16px 30px;
  border-top:1px solid #ffffff08;
}
.footer-brand{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  color:#333;letter-spacing:3px;margin-bottom:10px;
}
.india-flag{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:6px}
.flag-stripe{width:20px;height:5px;border-radius:2px}

/* Animations on enter */
.section-block{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.section-block.visible{opacity:1;transform:translateY(0)}

/* Loading state */
#loading-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:16px;
}
.loading-spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid #ffffff10;border-top-color:var(--orange);
  animation:spin 1s linear infinite;
}
.loading-text{font-size:12px;color:var(--muted);letter-spacing:2px}
</style>
</head>
<body>

<!-- ── INTRO ──────────────────────────────────────────────────── -->
<div id="intro">
  <div class="starfield" id="starfield"></div>
  <div class="intro-glow"></div>

  <div class="intro-logo-ring" id="intro-logo">
    <div class="intro-logo-fallback">RIZZ<br>LIVE</div>
  </div>

  <div class="intro-title">RIZZ LIVE</div>
  <div class="intro-sub">Weekly Honour Wall</div>
  <div class="intro-india">🇮🇳 &nbsp; INDIA &nbsp; 🇮🇳</div>
  <div class="live-pill"><span class="live-dot"></span>LIVE NOW</div>
  <div class="countdown" id="countdown">3</div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────────── -->
<div id="main">

  <!-- Header -->
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="hdr-logo-ring" id="hdr-logo">
        <div class="hdr-logo-fallback">RIZZ<br>LIVE</div>
      </div>
      <div>
        <div class="hdr-brand">RIZZ LIVE</div>
        <div class="hdr-sub">India</div>
      </div>
    </div>
    <div class="hdr-center">Weekly<br>Honours</div>
    <div class="hdr-live">
      <span class="hdr-live-dot"></span>LIVE
    </div>
  </div>

  <!-- Sections -->
  <div class="sections-wrap" id="sections-container">
    <div id="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">LOADING DATA...</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="page-footer">
    <div class="footer-brand">RIZZ LIVE · INDIA · WEEKLY HONOURS</div>
    <div class="india-flag">
      <div class="flag-stripe" style="background:#ff9933"></div>
      <div class="flag-stripe" style="background:#ffffff"></div>
      <div class="flag-stripe" style="background:#138808"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const SECTIONS_CONFIG = [
  { key:'agency',      emoji:'🏆', title:'Top 3 Agency',
    defaultWeek:'Week 1st',
    stat:{ label:'Ruby Target', icon:'ruby', color:'#ff4d80' } },

  { key:'host',        emoji:'🎤', title:'Top 3 Host',
    defaultWeek:'Week 1st',
    stat:{ label:'Ruby Target', icon:'ruby', color:'#ff4d80' } },

  { key:'recharger',   emoji:'💰', title:'Top 3 Recharger',
    defaultWeek:'Week 1st',
    stat:{ label:'Weekly Recharge', icon:'coin', color:'#ffd700' } },

  { key:'gifter',      emoji:'🎁', title:'Top 3 Gifter',
    defaultWeek:'Week 1st',
    stat:{ label:'Ruby', icon:'ruby', color:'#ff4d80' } },

  { key:'activehost',  emoji:'🔴', title:'Top 3 Active Host',
    defaultWeek:'Sabse Zyada Live Time',
    stat:{ label:'Live Time', icon:'clock', color:'#00e5ff' } },

  { key:'newagency',   emoji:'🌟', title:'New Top 3 Agency',
    defaultWeek:'Naye Agency — Week 1st',
    stat:{ label:'Ruby Target', icon:'ruby', color:'#ff4d80' } },

  { key:'agencytime',  emoji:'⏱', title:'Top 3 Agency App Time',
    defaultWeek:'Sabse Zyada App Par Samay',
    stat:{ label:'App Time', icon:'clock', color:'#00e5ff' } },
];

const RANK_META = {
  1:{ medal:'🥇 GOLD',  sz:'big', order:2 },
  2:{ medal:'🥈 SILVER', sz:'sm',  order:1 },
  3:{ medal:'🥉 BRONZE', sz:'sm',  order:3 },
};
const DISPLAY_ORDER = [2,1,3]; // Silver - Gold - Bronze visual layout

// ═══════════════════════════════════════════════════════════════
//  SVG ICONS
// ═══════════════════════════════════════════════════════════════
function rubySVG(s=16){
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24">
    <defs>
      <linearGradient id="rg${s}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff1744"/>
        <stop offset="45%" stop-color="#ff4d80"/>
        <stop offset="100%" stop-color="#7b0026"/>
      </linearGradient>
    </defs>
    <polygon points="12,1 22,8 12,23 2,8" fill="url(#rg${s})" stroke="#ff1744" stroke-width=".3"/>
    <polygon points="12,1 17,8 12,7 7,8" fill="#ff6090" opacity=".7"/>
    <polygon points="7,8 12,7 17,8 12,23" fill="#9b0030" opacity=".5"/>
    <line x1="12" y1="1" x2="12" y2="7" stroke="#ffaac5" stroke-width=".5" opacity=".8"/>
  </svg>`;
}
function coinSVG(s=16){
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24">
    <defs>
      <radialGradient id="cg${s}" cx="38%" cy="33%">
        <stop offset="0%" stop-color="#fff0a0"/>
        <stop offset="55%" stop-color="#ffd700"/>
        <stop offset="100%" stop-color="#a07000"/>
      </radialGradient>
    </defs>
    <circle cx="12" cy="12" r="10.5" fill="url(#cg${s})" stroke="#a07000" stroke-width=".5"/>
    <circle cx="12" cy="12" r="8.5" fill="none" stroke="#ffe98a" stroke-width=".7" opacity=".6"/>
    <text x="12" y="16.5" text-anchor="middle" font-size="9" font-weight="700" fill="#7a5c00" font-family="serif">₹</text>
  </svg>`;
}
function clockSVG(s=16){
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#00e5ff" stroke-width="1.3"/>
    <circle cx="12" cy="12" r="1.4" fill="#00e5ff"/>
    <line x1="12" y1="12" x2="12" y2="5.5" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="16.5" y2="14.5" stroke="#00bcd4" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`;
}
function getIcon(type, size=15){
  if(type==='ruby') return rubySVG(size);
  if(type==='coin') return coinSVG(size);
  if(type==='clock') return clockSVG(size);
  return '';
}

// ═══════════════════════════════════════════════════════════════
//  BUILD UI
// ═══════════════════════════════════════════════════════════════
function buildCard(secCfg, rank, rankData){
  const rm = RANK_META[rank];
  const d = rankData || {};
  const name = d.name || '— — —';
  const stat = d.stat || '—';
  const dp   = d.dp   || '';
  const frame= d.frame|| '';

  const card = document.createElement('div');
  card.className = `top-card rank${rank}`;
  card.dataset.key  = secCfg.key;
  card.dataset.rank = rank;

  // DP image HTML
  const dpImgHTML = dp
    ? `<img src="${dp}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : `<span style="display:flex;font-size:9px;color:#444;text-align:center;align-items:center;justify-content:center;width:100%;height:100%">DP</span>`;

  // Frame HTML
  const frameHTML = frame
    ? `<img class="dp-frame-img" src="${frame}" alt="frame" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="dp-frame-ring" style="display:none"></div>`
    : `<div class="dp-frame-ring"></div>`;

  card.innerHTML = `
    <span class="rank-badge">${rank}</span>
    <div class="dp-wrapper sz-${rm.sz}">
      <div class="dp-circle">${dpImgHTML}</div>
      ${frameHTML}
    </div>
    <div class="medal-label">${rm.medal}</div>
    <div class="card-name">${escHtml(name)}</div>
    <div class="stat-row">
      <div class="stat-icon">${getIcon(secCfg.stat.icon,15)}</div>
      <div class="stat-text">
        <span class="stat-label">${secCfg.stat.label}</span>
        <span class="stat-val" style="color:${secCfg.stat.color}">${escHtml(stat)}</span>
      </div>
    </div>`;

  return card;
}

function buildSection(secCfg, secData){
  const week = (secData && secData.week) ? secData.week : secCfg.defaultWeek;

  const block = document.createElement('div');
  block.className = 'section-block';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'sec-header';
  hdr.innerHTML = `
    <div class="sec-emoji">${secCfg.emoji}</div>
    <div class="sec-title">${secCfg.title}</div>
    <div class="sec-week">${escHtml(week)}</div>`;
  block.appendChild(hdr);

  // Top 3 Row (Silver → Gold → Bronze layout)
  const row = document.createElement('div');
  row.className = 'top3-row';
  DISPLAY_ORDER.forEach(rank => {
    const rankData = secData && secData.ranks ? secData.ranks[rank] : null;
    row.appendChild(buildCard(secCfg, rank, rankData));
  });
  block.appendChild(row);

  // Divider
  const div = document.createElement('div');
  div.className = 'sec-divider';
  div.innerHTML = `<div class="sec-divider-line"></div><span style="font-size:14px;opacity:.6">${secCfg.emoji}</span><div class="sec-divider-line"></div>`;
  block.appendChild(div);

  return block;
}

function renderSections(data){
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  SECTIONS_CONFIG.forEach((secCfg, i) => {
    const secData = data && data.sections ? data.sections[secCfg.key] : null;
    const block = buildSection(secCfg, secData);
    container.appendChild(block);

    // Staggered entrance animation
    setTimeout(() => block.classList.add('visible'), 80 * i);
  });
}

function applyLogo(src){
  if(!src) return;
  // Intro logo
  const il = document.getElementById('intro-logo');
  if(il) il.innerHTML = `<img src="${src}" alt="logo" onerror="this.innerHTML='<div class=intro-logo-fallback>RIZZ<br>LIVE</div>'">`;
  // Header logo
  const hl = document.getElementById('hdr-logo');
  if(hl) hl.innerHTML = `<img src="${src}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.innerHTML='<div class=hdr-logo-fallback>RIZZ<br>LIVE</div>'">`;
}

// ═══════════════════════════════════════════════════════════════
//  DATA LOADING
//  Tries rizz-data.json first, falls back to images/ folder
// ═══════════════════════════════════════════════════════════════
async function loadData(){
  let data = null;

  // 1. Try rizz-data.json (Admin se export kiya hua)
  try {
    const res = await fetch('./rizz-data.json?v=' + Date.now());
    if(res.ok){
      const text = await res.text();
      if(text && text.trim() !== '' && text.trim() !== '{}'){
        data = JSON.parse(text);
        console.log('✅ rizz-data.json loaded!');
      }
    }
  } catch(e){
    console.log('ℹ️ rizz-data.json nahi mila, default use ho raha hai');
  }

  // 2. Apply logo (JSON mein hai ya images/ folder mein)
  if(data && data.logo){
    applyLogo(data.logo);
  } else {
    // images/ folder se try karo
    const logoImg = new Image();
    logoImg.onload = () => applyLogo(logoImg.src);
    logoImg.src = './images/app_logo.png';
  }

  // 3. Render sections
  renderSections(data);
}

// ═══════════════════════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════════════════════
(function makeStars(){
  const sf = document.getElementById('starfield');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.2+0.4;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${1.4+Math.random()*2.2}s;
      --delay:${Math.random()*3}s;
      opacity:${Math.random()*.5};
    `;
    sf.appendChild(s);
  }
})();

// ═══════════════════════════════════════════════════════════════
//  COUNTDOWN → MAIN
// ═══════════════════════════════════════════════════════════════
let countN = 3;
const cdEl = document.getElementById('countdown');

const countInterval = setInterval(() => {
  countN--;
  if(countN <= 0){
    clearInterval(countInterval);
    cdEl.textContent = '🔥';
    setTimeout(() => {
      const intro = document.getElementById('intro');
      const main  = document.getElementById('main');
      intro.classList.add('out');
      setTimeout(() => {
        intro.style.display = 'none';
        main.style.display  = 'block';
        loadData();
      }, 700);
    }, 500);
  } else {
    cdEl.textContent = countN;
    cdEl.style.animation = 'none';
    void cdEl.offsetWidth;
    cdEl.style.animation = 'countPop .4s ease';
  }
}, 1000);

function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
