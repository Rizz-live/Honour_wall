<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Live — Honour Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03020a;--gold:#ffd700;--gold2:#ffe566;--gold3:#ffb300;
  --silver:#c8ccd8;--bronze:#cd7f32;--pink:#ff3d7f;
  --cyan:#00e5ff;--accent:#b44fff;--text:#f5f3ff;--muted:#4a4870;
}
html,body{background:var(--bg);min-height:100vh;overflow-x:hidden}
body{font-family:'Rajdhani',sans-serif;color:var(--text)}

/* ══ INTRO ══ */
#intro{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
  background:radial-gradient(ellipse at 50% 30%,#1e0840 0%,#0a011f 50%,#03020a 100%);
  transition:opacity 1.4s cubic-bezier(.4,0,.2,1),transform 1.6s cubic-bezier(.4,0,.2,1);
}
#intro.out{opacity:0;transform:scale(1.08) translateY(-30px);pointer-events:none}
.star-field{position:absolute;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:var(--op,.7);transform:scale(1.6)}}
#fw-canvas{position:absolute;inset:0;z-index:1;pointer-events:none}
.intro-grid{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(255,215,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,.03) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at center,rgba(0,0,0,.6) 0%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse at center,rgba(0,0,0,.6) 0%,transparent 70%);
}
.intro-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1}
.intro-orb1{width:400px;height:400px;background:rgba(180,79,255,.12);top:-80px;left:-80px;animation:orbF 8s ease-in-out infinite}
.intro-orb2{width:300px;height:300px;background:rgba(255,179,0,.08);bottom:-60px;right:-60px;animation:orbF 10s ease-in-out infinite 2s}
.intro-orb3{width:200px;height:200px;background:rgba(0,229,255,.06);top:40%;left:60%;animation:orbF 6s ease-in-out infinite 1s}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-25px)}}

.intro-center{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0}

.intro-brand-row{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
  opacity:0;animation:fSD .7s ease .2s forwards;
}
.intro-brand-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.4}
.intro-brand-name{font-family:'Cinzel Decorative',cursive;font-size:10px;font-weight:700;letter-spacing:7px;color:rgba(255,215,0,.4);text-transform:uppercase}
@keyframes fSD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

/* Trophy */
.trophy-wrap{
  position:relative;width:150px;height:150px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:6px;
  opacity:0;animation:tIn .9s cubic-bezier(.34,1.56,.64,1) .5s forwards;
}
@keyframes tIn{from{opacity:0;transform:scale(.35) translateY(50px)}to{opacity:1;transform:scale(1) translateY(0)}}
.trophy-glow{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.4) 0%,rgba(255,179,0,.12) 50%,transparent 70%);animation:tGlow 2s ease-in-out infinite alternate}
@keyframes tGlow{from{transform:scale(.88);opacity:.5}to{transform:scale(1.18);opacity:1}}
.trophy-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:1.5px solid transparent;
  background:linear-gradient(#03020a,#03020a) padding-box,
    conic-gradient(from 0deg,rgba(255,215,0,.9),rgba(255,179,0,.15),rgba(255,215,0,.9)) border-box;
  animation:tRing 5s linear infinite;
}
@keyframes tRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.trophy-spark{
  position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);
  top:50%;left:50%;
  animation:spk var(--sd,2s) ease-out infinite var(--ss,.3s);
}
@keyframes spk{0%{transform:rotate(var(--sa,0deg)) translateX(0) scale(1);opacity:1}100%{transform:rotate(var(--sa,0deg)) translateX(85px) scale(0);opacity:0}}

/* HONOUR WALL text */
.hw-title-wrap{text-align:center;margin-bottom:4px;opacity:0;animation:fSU .8s ease 1.1s forwards}
.hw-line1{
  font-family:'Cinzel Decorative',cursive;font-size:36px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(180deg,#ffffff 0%,#ffe88a 30%,#ffd700 55%,#c88000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;display:block;
  animation:tShimmer 3s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 20px rgba(255,200,0,.4));
}
@keyframes tShimmer{from{filter:drop-shadow(0 0 12px rgba(255,200,0,.4))}to{filter:drop-shadow(0 0 40px rgba(255,200,0,.95))}}
.hw-line2{
  font-family:'Cinzel Decorative',cursive;font-size:20px;font-weight:900;letter-spacing:18px;
  background:linear-gradient(90deg,#ffe088,#ffd700,#ffb300,#ffd700,#ffe088);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-top:2px;
  animation:wFlow 3s linear infinite;
}
@keyframes wFlow{0%{background-position:0%}100%{background-position:200%}}
.hw-ornament{display:flex;align-items:center;gap:8px;margin:10px 0 5px;opacity:0;animation:fSU .6s ease 1.4s forwards}
.hw-orn-line{flex:1;height:1px;max-width:55px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.6))}
.hw-orn-line.r{background:linear-gradient(90deg,rgba(255,215,0,.6),transparent)}
.hw-orn-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px rgba(255,215,0,.9)}
.intro-tagline{font-size:9px;letter-spacing:5px;color:rgba(255,215,0,.3);text-transform:uppercase;margin-top:4px;opacity:0;animation:fSU .6s ease 1.6s forwards}
.intro-progress-wrap{width:170px;height:1.5px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:20px;overflow:hidden;opacity:0;animation:fSU .6s ease 1.8s forwards}
.intro-progress-bar{height:100%;width:0%;background:linear-gradient(90deg,transparent,var(--gold3),var(--gold),var(--gold2));box-shadow:0 0 12px var(--gold);animation:pFill 3.5s cubic-bezier(.4,0,.2,1) .3s forwards}
@keyframes pFill{from{width:0%}to{width:100%}}
@keyframes fSU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ══ MAIN ══ */
#main{display:none;width:100%;max-width:540px;margin:0 auto;min-height:100vh;position:relative;z-index:1;padding-bottom:80px}
#confetti-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.bg-glow1{width:600px;height:600px;background:radial-gradient(circle,rgba(180,79,255,.05) 0%,transparent 70%);top:-150px;right:-200px;animation:bgF 12s ease-in-out infinite}
.bg-glow2{width:500px;height:500px;background:radial-gradient(circle,rgba(255,179,0,.04) 0%,transparent 70%);bottom:50px;left:-150px;animation:bgF 16s ease-in-out infinite 3s}
@keyframes bgF{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-35px)}}

/* Header */
.page-header{
  position:sticky;top:0;z-index:50;min-height:56px;padding:0 14px;
  background:rgba(3,2,10,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:space-between;gap:8px;overflow:hidden;
}
.page-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,215,0,.8) 40%,rgba(255,215,0,1) 50%,rgba(255,215,0,.8) 60%,transparent 95%);
  animation:hLine 4s ease-in-out infinite;
}
@keyframes hLine{0%,100%{opacity:.3}50%{opacity:.9}}
.page-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.07) 30%,rgba(180,79,255,.07) 70%,transparent)}
.hdr-left{display:flex;align-items:center;gap:9px;flex-shrink:0}
.hdr-text-group{display:flex;flex-direction:column;gap:1px}
.hdr-brand{
  font-family:'Cinzel Decorative',cursive;font-size:10px;font-weight:700;
  background:linear-gradient(90deg,#ffe566,#ffd700,#ffb300);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:1.5px;line-height:1.2;white-space:nowrap;
}
.hdr-sub{font-size:7px;color:rgba(255,215,0,.28);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}
.hdr-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.hdr-title-main{
  font-family:'Cinzel',serif;font-size:12px;font-weight:900;letter-spacing:5px;text-transform:uppercase;
  background:linear-gradient(180deg,#fff 0%,#ffe88a 50%,rgba(255,215,0,.85) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;
}
.hdr-title-line{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.4),transparent);margin-top:1px}
.hdr-title-sub{font-size:6.5px;letter-spacing:3.5px;color:rgba(255,255,255,.16);text-transform:uppercase;white-space:nowrap}

/* Hero Banner */
.hero-banner{position:relative;padding:20px 16px 14px;text-align:center;overflow:hidden}
.hero-banner::before{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.12),transparent)}
.hero-week-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(255,215,0,.1));
  border:1px solid rgba(255,215,0,.18);border-radius:30px;
  padding:5px 14px;margin-bottom:8px;
  font-family:'Cinzel',serif;font-size:8.5px;font-weight:700;
  color:rgba(255,215,0,.65);letter-spacing:3px;text-transform:uppercase;
  position:relative;overflow:hidden;
}
.hero-week-badge::after{content:'';position:absolute;top:0;left:-50%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,215,0,.08),transparent);animation:bSweep 3s ease-in-out infinite}
@keyframes bSweep{0%{left:-50%}100%{left:150%}}
.hero-title{
  font-family:'Cinzel Decorative',cursive;font-size:20px;font-weight:900;
  background:linear-gradient(180deg,#fff 0%,#ffd700 60%,#c88000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:2px;line-height:1.15;margin-bottom:5px;
}
.hero-sub{font-size:8.5px;color:rgba(255,255,255,.2);letter-spacing:4px;text-transform:uppercase}

/* Section */
.section-block{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s ease;padding-bottom:4px}
.section-block.visible{opacity:1;transform:translateY(0)}
.sec-header{position:relative;text-align:center;padding:20px 16px 10px}
.sec-header-bg{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,215,0,.025) 0%,transparent 100%);pointer-events:none}
.sec-emoji{font-size:22px;margin-bottom:4px;display:block;filter:drop-shadow(0 0 8px rgba(255,215,0,.5))}
.sec-title{font-family:'Cinzel',serif;font-size:12.5px;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase}
.sec-week{font-size:8px;color:var(--muted);letter-spacing:3px;margin-top:3px;text-transform:uppercase}
.sec-ornament{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:7px}
.sec-orn-line{width:36px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.28))}
.sec-orn-line.r{background:linear-gradient(90deg,rgba(255,215,0,.28),transparent)}
.sec-orn-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,215,0,.35)}

/* Top3 Row */
.top3-row{display:flex;align-items:flex-end;justify-content:center;gap:5px;padding:10px 5px 15px}

/* Cards */
.top-card{
  display:flex;flex-direction:column;align-items:center;
  border-radius:15px;padding:10px 5px 11px;
  position:relative;flex:1;min-width:0;
  animation:cardIn .65s cubic-bezier(.34,1.2,.64,1) both;
  transition:transform .25s ease;overflow:visible;
}
.top-card:active{transform:scale(.97)}
.top-card.rank1{
  background:linear-gradient(170deg,#071830 0%,#0c2248 45%,#04101e 100%);
  border:1px solid rgba(77,216,240,.48);
  box-shadow:0 0 28px rgba(77,216,240,.1),0 12px 38px rgba(0,0,0,.55),inset 0 1px 0 rgba(77,216,240,.18);
}
.top-card.rank2{
  background:linear-gradient(170deg,#0c0c20 0%,#16162e 50%,#0c0c20 100%);
  border:1px solid rgba(200,204,216,.2);
  box-shadow:0 0 18px rgba(200,204,216,.05),0 8px 28px rgba(0,0,0,.45),inset 0 1px 0 rgba(200,204,216,.08);
}
.top-card.rank3{
  background:linear-gradient(170deg,#110d08 0%,#1e1206 50%,#110d08 100%);
  border:1px solid rgba(205,127,50,.26);
  box-shadow:0 0 18px rgba(205,127,50,.06),0 8px 28px rgba(0,0,0,.45),inset 0 1px 0 rgba(205,127,50,.1);
}
.top-card.rank1::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(77,216,240,.45),transparent)}
.top-card.rank2::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,204,216,.25),transparent)}
.top-card.rank3::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(205,127,50,.28),transparent)}

.rank-badge{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;z-index:10}
.rank1 .rank-badge{background:linear-gradient(135deg,#b9f2ff,#4dd8f0,#0090aa);color:#001a22;box-shadow:0 2px 10px rgba(77,216,240,.7)}
.rank2 .rank-badge{background:linear-gradient(135deg,#eceff8,#b0b4c8,#7a7e8e);color:#0a0a1a;box-shadow:0 2px 8px rgba(180,184,210,.4)}
.rank3 .rank-badge{background:linear-gradient(135deg,#e8a060,#b06830,#7a3e10);color:#fff8f0;box-shadow:0 2px 8px rgba(180,100,40,.4)}

.crown-ico{display:block;font-size:20px;text-align:center;margin-bottom:3px;line-height:1;filter:drop-shadow(0 0 10px rgba(77,216,240,.9));animation:cFloat 2.8s ease-in-out infinite}
@keyframes cFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-5px) rotate(5deg)}}

/* DP */
.dp-wrap{position:relative;margin:0 auto;flex-shrink:0}
.dp-wrap.big{width:74px;height:74px}
.dp-wrap.sm{width:60px;height:60px}
.dp-img-circle{width:100%;height:100%;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#1a1030,#0e0c20);display:flex;align-items:center;justify-content:center}
.dp-img-circle img{width:100%;height:100%;object-fit:cover}
.dp-no-img{font-size:8px;color:#555;text-align:center;line-height:1.3}
.rank1 .dp-img-circle{border:2.5px solid #4dd8f0;box-shadow:0 0 0 2px rgba(77,216,240,.1),0 0 22px rgba(77,216,240,.28)}
.rank2 .dp-img-circle{border:2px solid var(--silver);box-shadow:0 0 0 2px rgba(200,204,216,.06),0 0 12px rgba(200,204,216,.1)}
.rank3 .dp-img-circle{border:2px solid var(--bronze);box-shadow:0 0 0 2px rgba(205,127,50,.06),0 0 12px rgba(205,127,50,.1)}
.dp-frame{position:absolute;inset:-12px;width:calc(100% + 24px);height:calc(100% + 24px);pointer-events:none;object-fit:contain;z-index:3}
.dp-ring{position:absolute;inset:-6px;border-radius:50%;border:1.5px dashed currentColor;opacity:.3;animation:rRot 14s linear infinite;pointer-events:none}
@keyframes rRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.rank1 .dp-ring{color:#4dd8f0;opacity:.5}
.rank2 .dp-ring{color:var(--silver)}
.rank3 .dp-ring{color:var(--bronze)}

/* Tier badge */
.tier-label{display:inline-flex;align-items:center;gap:4px;border-radius:30px;padding:3px 9px 3px 7px;margin-top:7px;position:relative;overflow:hidden;flex-shrink:0}
.tier-label::after{content:'';position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);animation:tSh 2.8s linear infinite}
@keyframes tSh{0%{left:-60%}100%{left:130%}}
.tier-diamond{background:linear-gradient(135deg,#001520,#002535,#001520);border:1px solid rgba(77,216,240,.42);box-shadow:0 0 10px rgba(77,216,240,.12)}
.tier-silver{background:linear-gradient(135deg,#121220,#1c1c2e,#121220);border:1px solid rgba(200,204,216,.28)}
.tier-bronze{background:linear-gradient(135deg,#180e04,#221206,#180e04);border:1px solid rgba(205,127,50,.32)}
.tier-txt{font-family:'Cinzel',serif;font-size:7.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.tier-diamond .tier-txt{background:linear-gradient(90deg,#b9f2ff,#4dd8f0,#00bcd4,#b9f2ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFl 3s linear infinite}
.tier-silver .tier-txt{background:linear-gradient(90deg,#eceff8,#c8ccd8,#90949e,#c8ccd8,#eceff8);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFl 3s linear infinite}
.tier-bronze .tier-txt{background:linear-gradient(90deg,#e8a060,#cd7f32,#a05020,#cd7f32,#e8a060);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFl 3s linear infinite}
@keyframes tFl{0%{background-position:0%}100%{background-position:200%}}

/* Name */
.card-name{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:#fff;text-align:center;word-break:break-word;max-width:126px;line-height:1.3;margin:6px 0;padding:0 3px;text-shadow:0 1px 8px rgba(0,0,0,.9)}
.rank1 .card-name{font-size:11.5px;text-shadow:0 0 12px rgba(77,216,240,.22),0 1px 8px rgba(0,0,0,.9)}
.rank2 .card-name{color:#e8e6ff}
.rank3 .card-name{color:#f5e8d8}

/* Stat chip */
.stat-chip{display:flex;align-items:center;gap:6px;border-radius:10px;padding:6px 7px;width:100%;position:relative;overflow:hidden}
.chip-ruby{background:linear-gradient(135deg,#1c0010,#320018,#1c0010);border:1px solid rgba(255,61,127,.32)}
.chip-coin{background:linear-gradient(135deg,#181200,#2a1e00,#181200);border:1px solid rgba(255,215,0,.32)}
.chip-clock{background:linear-gradient(135deg,#001618,#002428,#001618);border:1px solid rgba(0,229,255,.32)}
.chip-icon-wrap{width:25px;height:25px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-ruby .chip-icon-wrap{background:rgba(255,61,127,.09);border:1px solid rgba(255,61,127,.16)}
.chip-coin .chip-icon-wrap{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.16)}
.chip-clock .chip-icon-wrap{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.16)}
.stat-body{display:flex;flex-direction:column;min-width:0;flex:1}
.stat-label{font-size:6.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:1px}
.chip-ruby .stat-label{color:rgba(255,100,160,.72)}
.chip-coin .stat-label{color:rgba(255,215,0,.72)}
.chip-clock .stat-label{color:rgba(0,229,255,.72)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank1 .stat-val{font-size:15px}
.chip-ruby .stat-val{color:#ff6fa3;text-shadow:0 0 8px rgba(255,61,127,.3)}
.chip-coin .stat-val{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.3)}
.chip-clock .stat-val{color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,.3)}

.sec-divider{display:flex;align-items:center;gap:8px;margin:0 16px 8px}
.sdl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.09),transparent)}
.sdd{width:3px;height:3px;border-radius:50%;background:rgba(255,215,0,.22);transform:rotate(45deg)}

@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}
.top3-row .top-card.rank2{animation-delay:.06s}

<script>
// STARS
(function(){
  const sf=document.getElementById('star-field');
  for(let i=0;i<160;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.2+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*5+2).toFixed(1)}s;--delay:${(Math.random()*6).toFixed(1)}s;--op:${(Math.random()*.65+.25).toFixed(2)}`;
    sf.appendChild(s);
  }
})();

// FIREWORKS (intro only)
(function(){
  const canvas=document.getElementById('fw-canvas'),ctx=canvas.getContext('2d');
  let W,H,active=true;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const parts=[],rockets=[];
  function rand(a,b){return Math.random()*(b-a)+a}
  class Rocket{
    constructor(){this.x=rand(W*.12,W*.88);this.y=H;this.vy=rand(-17,-11);this.vx=rand(-2,2);this.target=rand(H*.08,H*.48);this.hue=rand(0,360);this.trail=[]}
    update(){
      this.trail.push({x:this.x,y:this.y});if(this.trail.length>10)this.trail.shift();
      this.x+=this.vx;this.y+=this.vy;this.vy+=.36;
      if(this.y<=this.target||this.vy>=0){this.explode();return false}return true;
    }
    explode(){
      const n=rand(75,120)|0;
      for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(1,8.5);parts.push({x:this.x,y:this.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,hue:this.hue+rand(-28,28),life:1,r:rand(1.5,3.8),g:.1})}
    }
    draw(){
      this.trail.forEach((t,i)=>{ctx.beginPath();ctx.arc(t.x,t.y,2*(i/this.trail.length),0,Math.PI*2);ctx.fillStyle=`hsla(${this.hue},100%,75%,${i/this.trail.length*.8})`;ctx.fill()});
      ctx.beginPath();ctx.arc(this.x,this.y,2.5,0,Math.PI*2);ctx.fillStyle=`hsl(${this.hue},100%,88%)`;ctx.fill();
    }
  }
  let last=0;
  function anim(){
    if(!active){ctx.clearRect(0,0,W,H);return}
    ctx.fillStyle='rgba(3,2,10,.16)';ctx.fillRect(0,0,W,H);
    const now=Date.now();
    if(now-last>rand(220,580)){rockets.push(new Rocket());last=now}
    for(let i=rockets.length-1;i>=0;i--){rockets[i].draw();if(!rockets[i].update())rockets.splice(i,1)}
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.97;p.life-=.013;
      if(p.life<=0){parts.splice(i,1);continue}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},100%,65%,${p.life})`;ctx.fill();
    }
    requestAnimationFrame(anim);
  }
  anim();
  window._stopFW=()=>{active=false};
})();

// CONFETTI
let confettiActive=false;
function startConfetti(){
  confettiActive=true;
  const canvas=document.getElementById('confetti-canvas'),ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const COLORS=['#ffd700','#ff9933','#ff3d7f','#b44fff','#00e5ff','#fff','#138808'];
  const bits=Array.from({length:90},()=>({
    x:Math.random()*window.innerWidth,y:-20-Math.random()*window.innerHeight,
    w:Math.random()*8+3,h:Math.random()*5+2,color:COLORS[Math.floor(Math.random()*COLORS.length)],
    angle:Math.random()*360,spin:Math.random()*3-1.5,vy:Math.random()*2+.9,vx:Math.random()*1-.5,
    opacity:Math.random()*.5+.4,wobble:Math.random()*Math.PI*2,ws:Math.random()*.04+.01
  }));
  function draw(){
    if(!confettiActive)return;
    ctx.clearRect(0,0,W,H);
    bits.forEach(b=>{
      b.y+=b.vy;b.x+=b.vx+Math.sin(b.wobble)*.3;b.angle+=b.spin;b.wobble+=b.ws;
      if(b.y>H+20){b.y=-20;b.x=Math.random()*W}
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.angle*Math.PI/180);
      ctx.globalAlpha=b.opacity;ctx.fillStyle=b.color;
      ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// CONFIG
const SECTIONS_CONFIG=[
  {key:'agency',     emoji:'🏆', title:'Top 3 Agency',          stat:{label:'Ruby Target',    type:'ruby'}},
  {key:'host',       emoji:'🎤', title:'Top 3 Host',             stat:{label:'Ruby Target',    type:'ruby'}},
  {key:'recharger',  emoji:'💰', title:'Top 3 Recharger',        stat:{label:'Weekly Recharge',type:'coin'}},
  {key:'gifter',     emoji:'🎁', title:'Top 3 Gifter',           stat:{label:'Ruby',           type:'ruby'}},
  {key:'activehost', emoji:'🔴', title:'Top 3 Active Host',      stat:{label:'Most of Time',   type:'clock'}},
  {key:'newagency',  emoji:'🌟', title:'New Top 3 Agency',       stat:{label:'Ruby Target',    type:'ruby'}},
  {key:'agencytime', emoji:'⏱',  title:'Top 3 Agency App Time',  stat:{label:'Most of Time',   type:'clock'}},
];
const RANK_META={
  1:{tierLabel:'💎 Diamond',tierClass:'tier-diamond',sz:'big'},
  2:{tierLabel:'🥈 Silver', tierClass:'tier-silver', sz:'sm'},
  3:{tierLabel:'🥉 Bronze', tierClass:'tier-bronze', sz:'sm'},
};
const DISPLAY_ORDER=[2,1,3];
const DEFAULT_NAMES={1:'Winner Name',2:'Runner Up',3:'Third Place'};

function rubyIcon(s=16){return `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="ri1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff8fa3"/><stop offset="35%" stop-color="#ff1744"/><stop offset="100%" stop-color="#7b0026"/></linearGradient><linearGradient id="ri2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffb3c1" stop-opacity=".9"/><stop offset="100%" stop-color="#ff1744" stop-opacity="0"/></linearGradient></defs><polygon points="16,2 28,12 16,30 4,12" fill="url(#ri1)"/><polygon points="16,2 24,12 16,10 8,12" fill="url(#ri2)" opacity=".85"/><polygon points="4,12 16,10 16,30" fill="#7b0026" opacity=".5"/><ellipse cx="13.5" cy="8.5" rx="2.5" ry="1.5" fill="#fff" opacity=".28" transform="rotate(-25,13.5,8.5)"/></svg>`}
function coinIcon(s=16){return `<svg width="${s}" height="${s}" viewBox="0 0 32 32"><defs><radialGradient id="ci1" cx="38%" cy="33%"><stop offset="0%" stop-color="#fffde0"/><stop offset="40%" stop-color="#ffd700"/><stop offset="100%" stop-color="#8a6000"/></radialGradient></defs><circle cx="16" cy="16" r="13" fill="url(#ci1)"/><circle cx="16" cy="16" r="11.5" fill="none" stroke="#a07a00" stroke-width=".7" opacity=".4"/><text x="16" y="21.5" text-anchor="middle" font-size="12" font-weight="900" fill="#7a5000" font-family="serif">₹</text></svg>`}
function clockIcon(s=16){return `<svg width="${s}" height="${s}" viewBox="0 0 32 32"><defs><radialGradient id="cli1" cx="40%" cy="35%"><stop offset="0%" stop-color="#80ffff"/><stop offset="50%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#006070"/></radialGradient></defs><circle cx="16" cy="16" r="13" fill="none" stroke="url(#cli1)" stroke-width="2"/><circle cx="16" cy="16" r="11" fill="#00151a" opacity=".7"/><line x1="16" y1="16" x2="16" y2="8.5" stroke="#80ffff" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="16" x2="21.5" y2="19.5" stroke="#00bcd4" stroke-width="1.5" stroke-linecap="round"/><circle cx="16" cy="16" r="2" fill="#00e5ff"/></svg>`}
function getIcon(t,s){return t==='coin'?coinIcon(s):t==='clock'?clockIcon(s):rubyIcon(s)}
function getChipClass(t){return t==='coin'?'chip-coin':t==='clock'?'chip-clock':'chip-ruby'}

function buildCard(secCfg,rank,rData){
  const rm=RANK_META[rank],d=rData||{};
  const name=(d.name&&String(d.name).trim())?String(d.name).trim():DEFAULT_NAMES[rank];
  const stat=(d.stat&&String(d.stat).trim())?String(d.stat).trim():'—';
  const dp=d.dp||'',frame=d.frame||'';
  const card=document.createElement('div');
  card.className=`top-card rank${rank}`;
  const dpHTML=dp?`<img src="${esc(dp)}" alt="" onerror="this.parentNode.innerHTML='<div class=dp-no-img>NO DP</div>'">`:`<div class="dp-no-img">NO DP</div>`;
  const frameHTML=frame?`<img class="dp-frame" src="${esc(frame)}" alt="" onerror="this.remove()">`:`<div class="dp-ring"></div>`;
  const crownHTML=rank===1?`<span class="crown-ico">💎</span>`:'';
  card.innerHTML=`${crownHTML}<span class="rank-badge">${rank}</span><div class="dp-wrap ${rm.sz}"><div class="dp-img-circle">${dpHTML}</div>${frameHTML}</div><div class="tier-label ${rm.tierClass}"><span class="tier-txt">${rm.tierLabel}</span></div><div class="card-name">${esc(name)}</div><div class="stat-chip ${getChipClass(secCfg.stat.type)}"><div class="chip-icon-wrap">${getIcon(secCfg.stat.type,16)}</div><div class="stat-body"><span class="stat-label">${secCfg.stat.label}</span><span class="stat-val">${esc(stat)}</span></div></div>`;
  return card;
}

function buildSection(secCfg,secData){
  const week=(secData&&secData.week)?secData.week:'Week 1st';
  const block=document.createElement('div');block.className='section-block';
  block.innerHTML=`<div class="sec-header"><div class="sec-header-bg"></div><span class="sec-emoji">${secCfg.emoji}</span><div class="sec-title">${secCfg.title}</div><div class="sec-week">${esc(week)}</div><div class="sec-ornament"><div class="sec-orn-line"></div><div class="sec-orn-dot"></div><div class="sec-orn-line r"></div></div></div>`;
  const row=document.createElement('div');row.className='top3-row';
  DISPLAY_ORDER.forEach(rank=>{
    let rData=null;
    if(secData&&secData.ranks){rData=secData.ranks[rank]||secData.ranks[String(rank)]||null}
    row.appendChild(buildCard(secCfg,rank,rData));
  });
  block.appendChild(row);
  const div=document.createElement('div');div.className='sec-divider';div.innerHTML='<div class="sdl"></div><div class="sdd"></div><div class="sdl"></div>';
  block.appendChild(div);return block;
}

function renderSections(data){
  const container=document.getElementById('sections-container');container.innerHTML='';
  SECTIONS_CONFIG.forEach((cfg,i)=>{
    const secData=data&&data.sections?data.sections[cfg.key]:null;
    const block=buildSection(cfg,secData);container.appendChild(block);
    setTimeout(()=>block.classList.add('visible'),120*i+80);
  });
}

function applyLogo(src){
  if(!src)return;
  const iImg=document.getElementById('intro-logo-img'),iFb=document.getElementById('intro-logo-fallback');
  if(iImg){iImg.onload=()=>{iImg.style.display='block';if(iFb)iFb.style.display='none'};iImg.onerror=()=>{iImg.style.display='none';if(iFb)iFb.style.display='flex'};iImg.src=src}
}

async function loadData(){
  let data=null;
  try{const res=await fetch('./rizz-data.json?v='+Date.now());if(res.ok){const t=await res.text();if(t&&t.trim()!=='{}')data=JSON.parse(t)}}catch(e){}
  if(data&&data.logo)applyLogo(data.logo);
  renderSections(data);
}

function enterMain(){
  if(window._stopFW)window._stopFW();
  const intro=document.getElementById('intro'),main=document.getElementById('main');
  intro.classList.add('out');
  setTimeout(()=>{intro.style.display='none';main.style.display='block';startConfetti();loadData();window.scrollTo(0,0)},900);
}
setTimeout(enterMain,4200);

(function(){
  fetch('./rizz-data.json?v='+Date.now()).then(r=>r.ok?r.json():null).then(d=>{if(d&&d.logo)applyLogo(d.logo)}).catch(()=>{});
})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
