<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Live — Honour Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03020a;--gold:#ffd700;--gold2:#ffe566;--gold3:#ffb300;
  --silver:#c8ccd8;--bronze:#cd7f32;--pink:#ff3d7f;
  --cyan:#00e5ff;--accent:#b44fff;--text:#f5f3ff;--muted:#4a4870;
}
html,body{background:var(--bg);min-height:100vh;overflow-x:hidden}
body{font-family:'Rajdhani',sans-serif;color:var(--text)}

/* ═══ INTRO ═══ */
#intro{
  position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:radial-gradient(ellipse at 50% 60%,#1a0635 0%,#0d0220 40%,#03020a 100%);
  transition:opacity 1.2s ease,transform 1.4s ease;
}
#intro.out{opacity:0;transform:scale(1.1) translateY(-40px);pointer-events:none}
.star-field{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:var(--op,.6);transform:scale(1.4)}}
#fw-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}
.intro-center{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center}
.intro-logo-wrap{position:relative;width:180px;height:180px;margin-bottom:12px}
.intro-logo-ring{
  position:absolute;inset:0;border-radius:50%;padding:3px;
  background:conic-gradient(from 0deg,var(--gold3),var(--pink),var(--accent),var(--cyan),var(--gold3));
  animation:ringRot 4s linear infinite;
  box-shadow:0 0 40px rgba(255,215,0,.4);
}
@keyframes ringRot{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
.intro-logo-inner{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#16063a,#2e0c5c,#0f0430);
  display:flex;align-items:center;justify-content:center;border:4px solid #03020a;
}
.intro-logo-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.logo-fallback-txt{font-family:'Cinzel Decorative',cursive;font-size:18px;font-weight:900;color:var(--gold);text-align:center;line-height:1.3}
.orbit-particle{position:absolute;width:6px;height:6px;border-radius:50%;top:50%;left:50%;margin:-3px}
.orbit-particle:nth-child(1){background:var(--gold);animation:orb 3s linear infinite}
.orbit-particle:nth-child(2){background:var(--pink);animation:orb 5s linear infinite reverse;width:4px;height:4px;margin:-2px}
.orbit-particle:nth-child(3){background:var(--cyan);animation:orb 4s linear infinite .5s;width:5px;height:5px;margin:-2.5px}
@keyframes orb{0%{transform:rotate(0deg) translateX(100px) rotate(0deg)}100%{transform:rotate(360deg) translateX(100px) rotate(-360deg)}}
.intro-crown{font-size:52px;display:block;animation:cBounce 2s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,215,0,.8));margin-bottom:8px}
@keyframes cBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px) scale(1.08)}}
.honour-text{
  font-family:'Cinzel Decorative',cursive;font-size:42px;font-weight:900;letter-spacing:6px;
  background:linear-gradient(180deg,#fff9e6 0%,var(--gold) 35%,var(--gold3) 65%,#a06000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hGlow 2s ease-in-out infinite alternate;line-height:1.1;
}
@keyframes hGlow{from{filter:drop-shadow(0 0 10px rgba(255,215,0,.5))}to{filter:drop-shadow(0 0 30px rgba(255,215,0,.9))}}
.intro-tagline{font-size:11px;color:var(--muted);letter-spacing:4px;margin-top:14px;text-transform:uppercase;animation:fadeUp .8s ease 1.4s both}
.intro-progress-wrap{width:200px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:24px;overflow:hidden;animation:fadeUp .8s ease 1.6s both}
.intro-progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold3),var(--gold));box-shadow:0 0 8px var(--gold);animation:pFill 3s linear .2s forwards}
@keyframes pFill{from{width:0%}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══ MAIN ═══ */
#main{display:none;width:100%;max-width:540px;margin:0 auto;min-height:100vh;position:relative;z-index:1;padding-bottom:80px}
#confetti-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* HEADER */
.page-header{
  position:sticky;top:0;z-index:50;padding:10px 16px;
  background:rgba(3,2,10,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,215,0,.1);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.page-header::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.5),transparent)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo-wrap{width:38px;height:38px;border-radius:50%;overflow:hidden;border:1.5px solid var(--gold3);background:#16063a;box-shadow:0 0 12px rgba(255,180,0,.3);flex-shrink:0}
.hdr-logo-wrap img{width:100%;height:100%;object-fit:cover}
.hdr-logo-fallback{font-family:'Cinzel Decorative',cursive;font-size:6px;font-weight:900;color:var(--gold);text-align:center;padding-top:10px;line-height:1.4}
.hdr-brand{font-family:'Cinzel Decorative',cursive;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;line-height:1.2}
.hdr-sub{font-size:8px;color:var(--muted);letter-spacing:3px}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:#fff}
.hdr-live{display:flex;align-items:center;gap:5px;background:rgba(255,61,127,.08);border:1px solid rgba(255,61,127,.25);border-radius:20px;padding:5px 10px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:lPing 1.4s ease infinite}
@keyframes lPing{0%{box-shadow:0 0 0 0 rgba(255,61,127,.6)}70%{box-shadow:0 0 0 8px rgba(255,61,127,0)}100%{box-shadow:0 0 0 0 rgba(255,61,127,0)}}
.live-txt{font-size:9px;font-weight:700;color:var(--pink);letter-spacing:2px}

/* SECTION */
.section-block{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease;padding-bottom:4px}
.section-block.visible{opacity:1;transform:translateY(0)}
.sec-header{text-align:center;padding:28px 16px 12px}
.sec-emoji{font-size:28px;margin-bottom:6px;display:block;filter:drop-shadow(0 0 10px rgba(255,215,0,.5))}
.sec-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
.sec-week{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:4px;text-transform:uppercase}
.sec-line{width:80px;height:1px;margin:10px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}

/* TOP 3 ROW */
.top3-row{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:8px 10px 16px}

/* ═══ CARD ═══ */
.top-card{
  display:flex;flex-direction:column;align-items:center;
  border-radius:20px;padding:28px 8px 14px;
  position:relative;flex:1;max-width:160px;
  animation:cardIn .6s ease both;
  transition:transform .3s ease;
  overflow:visible;
}
.top-card:hover{transform:translateY(-6px) scale(1.02)}

/* Card backgrounds */
.top-card.rank1{
  background:linear-gradient(160deg,#0b1a2e 0%,#0d2545 40%,#071525 100%);
  border:1px solid rgba(100,220,255,.45);min-height:300px;
  box-shadow:0 8px 40px rgba(100,220,255,.15),inset 0 1px 0 rgba(100,220,255,.15);
}
.top-card.rank2{
  background:linear-gradient(160deg,#0e0e22 0%,#181830 50%,#0e0e22 100%);
  border:1px solid rgba(200,204,216,.2);min-height:270px;
  box-shadow:0 6px 24px rgba(200,204,216,.07),inset 0 1px 0 rgba(200,204,216,.07);
}
.top-card.rank3{
  background:linear-gradient(160deg,#120e0a 0%,#201408 50%,#120e0a 100%);
  border:1px solid rgba(205,127,50,.25);min-height:270px;
  box-shadow:0 6px 24px rgba(205,127,50,.06),inset 0 1px 0 rgba(205,127,50,.06);
}

/* crown */
.crown-ico{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:26px;filter:drop-shadow(0 0 12px rgba(100,220,255,.9));
  animation:cFloat 2.5s ease-in-out infinite;z-index:10;
}
@keyframes cFloat{0%,100%{transform:translateX(-50%) translateY(0) rotate(-4deg)}50%{transform:translateX(-50%) translateY(-8px) rotate(4deg)}}

/* rank badge */
.rank-badge{
  position:absolute;top:-10px;right:12px;
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:13px;z-index:10;
}
.rank1 .rank-badge{background:linear-gradient(135deg,#b9f2ff,#4dd8f0,#0090aa);color:#001a22;box-shadow:0 2px 12px rgba(77,216,240,.6)}
.rank2 .rank-badge{background:linear-gradient(135deg,#eceff8,#b0b4c8,#7a7e8e);color:#0a0a1a;box-shadow:0 2px 8px rgba(180,184,210,.4)}
.rank3 .rank-badge{background:linear-gradient(135deg,#e8a060,#b06830,#7a3e10);color:#fff8f0;box-shadow:0 2px 8px rgba(180,100,40,.4)}

/* DP */
.dp-wrap{position:relative;margin:6px auto 0;flex-shrink:0}
.dp-wrap.big{width:88px;height:88px}
.dp-wrap.sm{width:72px;height:72px}
.dp-img-circle{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#2a1a4a,#1a1830);
  display:flex;align-items:center;justify-content:center;
}
.dp-img-circle img{width:100%;height:100%;object-fit:cover}
.dp-no-img{font-size:9px;color:#666;text-align:center;line-height:1.3}
.rank1 .dp-img-circle{border:3px solid #4dd8f0;box-shadow:0 0 0 3px rgba(77,216,240,.12),0 0 28px rgba(77,216,240,.25)}
.rank2 .dp-img-circle{border:2.5px solid var(--silver);box-shadow:0 0 0 2px rgba(200,204,216,.08),0 0 14px rgba(200,204,216,.1)}
.rank3 .dp-img-circle{border:2.5px solid var(--bronze);box-shadow:0 0 0 2px rgba(205,127,50,.08),0 0 14px rgba(205,127,50,.1)}
.dp-frame{position:absolute;inset:-12px;width:calc(100% + 24px);height:calc(100% + 24px);pointer-events:none;object-fit:contain;z-index:3}
.dp-ring{position:absolute;inset:-7px;border-radius:50%;border:1.5px dashed currentColor;opacity:.35;animation:sRing 12s linear infinite;pointer-events:none}
.rank1 .dp-ring{color:#4dd8f0;opacity:.6}
.rank2 .dp-ring{color:var(--silver)}
.rank3 .dp-ring{color:var(--bronze)}
@keyframes sRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ═══ TIER BADGE ═══ */
.tier-label{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:30px;padding:4px 11px 4px 8px;
  margin-top:10px;position:relative;overflow:hidden;flex-shrink:0;
}
.tier-label::after{
  content:'';position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  animation:tShimmer 2.4s linear infinite;pointer-events:none;
}
@keyframes tShimmer{0%{left:-60%}100%{left:130%}}
.tier-diamond{background:linear-gradient(135deg,#001824,#002a3a,#001824);border:1px solid rgba(100,220,255,.5);box-shadow:0 0 14px rgba(100,220,255,.2)}
.tier-silver{background:linear-gradient(135deg,#141420,#1e1e30,#141420);border:1px solid rgba(200,204,216,.35);box-shadow:0 0 10px rgba(200,204,216,.08)}
.tier-bronze{background:linear-gradient(135deg,#1a1008,#251808,#1a1008);border:1px solid rgba(205,127,50,.4);box-shadow:0 0 10px rgba(205,127,50,.08)}
.tier-txt{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.tier-diamond .tier-txt{background:linear-gradient(90deg,#b9f2ff,#4dd8f0,#00bcd4,#b9f2ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFlow 3s linear infinite}
.tier-silver .tier-txt{background:linear-gradient(90deg,#eceff8,#c8ccd8,#90949e,#c8ccd8,#eceff8);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFlow 3s linear infinite}
.tier-bronze .tier-txt{background:linear-gradient(90deg,#e8a060,#cd7f32,#a05020,#cd7f32,#e8a060);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFlow 3s linear infinite}
@keyframes tFlow{0%{background-position:0%}100%{background-position:200%}}

/* ═══ NAME ═══ */
.card-name{
  font-family:'Cinzel',serif;
  font-size:11px;font-weight:700;
  color:#ffffff;
  text-align:center;
  word-break:break-word;
  max-width:138px;
  line-height:1.35;
  margin-top:8px;
  margin-bottom:7px;
  padding:0 4px;
  position:relative;
  z-index:2;
  text-shadow:0 1px 8px rgba(0,0,0,.8);
}
.rank1 .card-name{font-size:12.5px;color:#fff;text-shadow:0 0 14px rgba(100,220,255,.3),0 1px 8px rgba(0,0,0,.8)}
.rank2 .card-name{color:#e8e6ff}
.rank3 .card-name{color:#f5e8d8}

/* ═══ STAT CHIP ═══ */
.stat-chip{
  display:flex;align-items:center;gap:7px;
  border-radius:12px;padding:7px 9px;width:100%;
  position:relative;overflow:hidden;
}
.chip-ruby{background:linear-gradient(135deg,#200010,#3a0020,#200010);border:1px solid rgba(255,61,127,.4);box-shadow:0 0 14px rgba(255,61,127,.1)}
.chip-coin{background:linear-gradient(135deg,#1a1400,#2e2200,#1a1400);border:1px solid rgba(255,215,0,.4);box-shadow:0 0 14px rgba(255,215,0,.1)}
.chip-clock{background:linear-gradient(135deg,#001a1a,#002e2e,#001a1a);border:1px solid rgba(0,229,255,.4);box-shadow:0 0 14px rgba(0,229,255,.1)}
.chip-icon-wrap{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-ruby .chip-icon-wrap{background:rgba(255,61,127,.12);border:1px solid rgba(255,61,127,.2)}
.chip-coin .chip-icon-wrap{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2)}
.chip-clock .chip-icon-wrap{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2)}
.stat-body{display:flex;flex-direction:column;min-width:0;flex:1}
.stat-label{font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:1px}
.chip-ruby .stat-label{color:rgba(255,100,160,.8)}
.chip-coin .stat-label{color:rgba(255,215,0,.8)}
.chip-clock .stat-label{color:rgba(0,229,255,.8)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank1 .stat-val{font-size:16px}
.chip-ruby .stat-val{color:#ff6fa3;text-shadow:0 0 10px rgba(255,61,127,.4)}
.chip-coin .stat-val{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.4)}
.chip-clock .stat-val{color:#00e5ff;text-shadow:0 0 10px rgba(0,229,255,.4)}

/* Divider */
.sec-divider{display:flex;align-items:center;gap:8px;margin:0 20px 10px}
.sdl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.15),transparent)}
.sdd{width:3px;height:3px;border-radius:50%;background:rgba(255,215,0,.3)}

@keyframes cardIn{from{opacity:0;transform:translateY(35px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.top3-row .top-card.rank2{animation-delay:.05s}
.top3-row .top-card.rank1{animation-delay:.12s}
.top3-row .top-card.rank3{animation-delay:.18s}

/* FOOTER */
.page-footer{text-align:center;padding:28px 16px 24px;border-top:1px solid rgba(255,255,255,.04);position:relative}
.page-footer::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.3),transparent)}
.footer-brand{font-family:'Cinzel Decorative',cursive;font-size:8px;font-weight:700;color:rgba(255,215,0,.15);letter-spacing:4px;margin-bottom:10px}
.india-flag{display:flex;align-items:center;justify-content:center;gap:2px}
.fs{width:22px;height:5px;border-radius:1px}

/* Loading */
#loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;gap:14px}
.loading-spinner{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.06);border-top-color:var(--gold);animation:sRing 1s linear infinite}
.loading-txt{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

/* BG */
.bg-glow{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.bg-glow1{width:500px;height:500px;background:radial-gradient(circle,rgba(180,79,255,.04) 0%,transparent 70%);top:-100px;right:-150px;animation:bgF 10s ease-in-out infinite}
.bg-glow2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,53,.03) 0%,transparent 70%);bottom:100px;left:-100px;animation:bgF 14s ease-in-out infinite 2s}
@keyframes bgF{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}

@media(max-width:360px){
  .honour-text{font-size:32px}
  .top-card.rank1{min-height:280px}
  .top-card.rank2,.top-card.rank3{min-height:255px}
}
</style>
</head>
<body>
<canvas id="fw-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- INTRO -->
<div id="intro">
  <div class="star-field" id="star-field"></div>
  <div class="intro-center">
    <span class="intro-crown">👑</span>
    <div class="intro-logo-wrap">
      <div class="intro-logo-ring">
        <div class="intro-logo-inner" id="intro-logo-inner">
          <div class="logo-fallback-txt">RIZZ<br>LIVE</div>
        </div>
      </div>
      <div class="orbit-particle"></div>
      <div class="orbit-particle"></div>
      <div class="orbit-particle"></div>
    </div>
    <div class="honour-text">HONOUR</div>
    <div class="honour-text" style="font-size:30px;letter-spacing:12px;margin-top:-4px">WALL</div>
    <div class="intro-tagline">🇮🇳 &nbsp; India's #1 Live Platform &nbsp; 🇮🇳</div>
    <div class="intro-progress-wrap"><div class="intro-progress-bar"></div></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="bg-glow bg-glow1"></div>
  <div class="bg-glow bg-glow2"></div>
  <div class="page-header">
    <div class="hdr-left">
      <div class="hdr-logo-wrap" id="hdr-logo-wrap"><div class="hdr-logo-fallback">RIZZ<br>LIVE</div></div>
      <div><div class="hdr-brand">RIZZ LIVE</div><div class="hdr-sub">Weekly Honours</div></div>
    </div>
    <div class="hdr-title">HONOUR WALL</div>
    <div class="hdr-live"><span class="live-dot"></span><span class="live-txt">LIVE</span></div>
  </div>
  <div id="sections-container">
    <div id="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-txt">Loading winners...</div>
    </div>
  </div>
  <div class="page-footer">
    <div class="footer-brand">RIZZ LIVE · INDIA · WEEKLY HONOURS</div>
    <div class="india-flag">
      <div class="fs" style="background:#ff9933"></div>
      <div class="fs" style="background:#fff;position:relative"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:#000080"></div></div>
      <div class="fs" style="background:#138808"></div>
    </div>
  </div>
</div>

<script>
// STARS
(function(){
  const sf=document.getElementById('star-field');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:${(Math.random()*5).toFixed(1)}s;--op:${(Math.random()*.5+.3).toFixed(2)}`;
    sf.appendChild(s);
  }
})();

// FIREWORKS
(function(){
  const canvas=document.getElementById('fw-canvas'),ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const parts=[],rockets=[];
  function rand(a,b){return Math.random()*(b-a)+a}
  class Rocket{
    constructor(){this.x=rand(W*.2,W*.8);this.y=H;this.vy=rand(-14,-10);this.vx=rand(-1.5,1.5);this.target=rand(H*.15,H*.45);this.hue=rand(0,360);this.done=false;this.trail=[]}
    update(){
      if(this.done)return false;
      this.trail.push({x:this.x,y:this.y});if(this.trail.length>8)this.trail.shift();
      this.x+=this.vx;this.y+=this.vy;this.vy+=.3;
      if(this.y<=this.target||this.vy>=0){this.explode();return false}
      return true;
    }
    explode(){
      for(let i=0;i<rand(60,100)|0;i++){const a=rand(0,Math.PI*2),sp=rand(1.5,7);parts.push({x:this.x,y:this.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,hue:this.hue+rand(-20,20),life:1,r:rand(1.5,3),g:.12})}
    }
    draw(){
      this.trail.forEach((t,i)=>{ctx.beginPath();ctx.arc(t.x,t.y,1.5*(i/this.trail.length),0,Math.PI*2);ctx.fillStyle=`hsla(${this.hue},90%,70%,${i/this.trail.length})`;ctx.fill()});
      ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fillStyle=`hsl(${this.hue},90%,80%)`;ctx.fill();
    }
  }
  let last=0;
  function anim(){
    ctx.fillStyle='rgba(3,2,10,.18)';ctx.fillRect(0,0,W,H);
    const now=Date.now();
    if(now-last>rand(300,700)){rockets.push(new Rocket());last=now}
    for(let i=rockets.length-1;i>=0;i--){rockets[i].draw();if(!rockets[i].update())rockets.splice(i,1)}
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.97;p.life-=.014;
      if(p.life<=0){parts.splice(i,1);continue}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},90%,65%,${p.life})`;ctx.fill();
    }
    requestAnimationFrame(anim);
  }
  anim();
})();

// CONFETTI
let confettiActive=false;
function startConfetti(){
  confettiActive=true;
  const canvas=document.getElementById('confetti-canvas'),ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const COLORS=['#ffd700','#ff6b35','#ff3d7f','#b44fff','#00e5ff','#ffffff','#ff9933','#138808'];
  const bits=Array.from({length:120},()=>({
    x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight-window.innerHeight,
    w:Math.random()*8+4,h:Math.random()*5+2,color:COLORS[Math.floor(Math.random()*COLORS.length)],
    angle:Math.random()*360,spin:Math.random()*3-1.5,vy:Math.random()*2+1.2,vx:Math.random()*1.2-.6,
    opacity:Math.random()*.6+.4,wobble:Math.random()*Math.PI*2,ws:Math.random()*.05+.01
  }));
  function draw(){
    if(!confettiActive)return;
    ctx.clearRect(0,0,W,H);
    bits.forEach(b=>{
      b.y+=b.vy;b.x+=b.vx+Math.sin(b.wobble)*.4;b.angle+=b.spin;b.wobble+=b.ws;
      if(b.y>H+20){b.y=-20;b.x=Math.random()*W}
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.angle*Math.PI/180);
      ctx.globalAlpha=b.opacity;ctx.fillStyle=b.color;
      const rx=-b.w/2,ry=-b.h/2;
      ctx.beginPath();ctx.moveTo(rx+1,ry);ctx.lineTo(rx+b.w-1,ry);ctx.quadraticCurveTo(rx+b.w,ry,rx+b.w,ry+1);
      ctx.lineTo(rx+b.w,ry+b.h-1);ctx.quadraticCurveTo(rx+b.w,ry+b.h,rx+b.w-1,ry+b.h);
      ctx.lineTo(rx+1,ry+b.h);ctx.quadraticCurveTo(rx,ry+b.h,rx,ry+b.h-1);
      ctx.lineTo(rx,ry+1);ctx.quadraticCurveTo(rx,ry,rx+1,ry);ctx.closePath();ctx.fill();ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

  {key:'host',       emoji:'🎤', title:'Top 3 Host',           stat:{label:'Ruby Target',    type:'ruby'}},

  {key:'gifter',     emoji:'🎁', title:'Top 3 Gifter',         stat:{label:'Ruby',           type:'ruby'}},

  {key:'newagency',  emoji:'🌟', title:'New Top 3 Agency',     stat:{label:'Ruby Target',    type:'ruby'}},

function getIcon(type,s){
  return type==='coin'?coinIcon(s):type==='clock'?clockIcon(s):rubyIcon(s);
}
function getChipClass(type){
  return type==='coin'?'chip-coin':type==='clock'?'chip-clock':'chip-ruby';
}

// BUILD CARD
function buildCard(secCfg, rank, rData){
  const rm = RANK_META[rank];
  const d  = rData || {};
  const name  = (d.name && d.name.trim()) ? d.name.trim() : DEFAULT_NAMES[rank];
  const stat  = (d.stat && d.stat.trim()) ? d.stat.trim() : '9,999';
  const dp    = d.dp    || '';
  const frame = d.frame || '';

  const card = document.createElement('div');
  card.className = `top-card rank${rank}`;

  const dpHTML = dp
    ? `<img src="${esc(dp)}" alt="" onerror="this.parentNode.innerHTML='<div class=dp-no-img>NO<br>DP</div>'">`
    : `<div class="dp-no-img">NO<br>DP</div>`;

  const frameHTML = frame
    ? `<img class="dp-frame" src="${esc(frame)}" alt="" onerror="this.remove()">`
    : `<div class="dp-ring"></div>`;

  const crownHTML = rank === 1 ? `<span class="crown-ico">💎</span>` : '';
  const chipClass = getChipClass(secCfg.stat.type);

  card.innerHTML = `
    ${crownHTML}
    <span class="rank-badge">${rank}</span>
    <div class="dp-wrap ${rm.sz}">
      <div class="dp-img-circle">${dpHTML}</div>
      ${frameHTML}
    </div>
    <div class="tier-label ${rm.tierClass}"><span class="tier-txt">${rm.tierLabel}</span></div>
    <div class="card-name">${esc(name)}</div>
    <div class="stat-chip ${chipClass}">
      <div class="chip-icon-wrap">${getIcon(secCfg.stat.type, 18)}</div>
      <div class="stat-body">
        <span class="stat-label">${secCfg.stat.label}</span>
        <span class="stat-val">${esc(stat)}</span>
      </div>
    </div>`;

  return card;
}

// BUILD SECTION
function buildSection(secCfg, secData){
  const week = (secData && secData.week) ? secData.week : 'Week 1st';
  const block = document.createElement('div');
  block.className = 'section-block';

  block.innerHTML = `
    <div class="sec-header">
      <span class="sec-emoji">${secCfg.emoji}</span>
      <div class="sec-title">${secCfg.title}</div>
      <div class="sec-week">${esc(week)}</div>
      <div class="sec-line"></div>
    </div>`;

  const row = document.createElement('div');
  row.className = 'top3-row';
  DISPLAY_ORDER.forEach(rank => {
    const rData = secData && secData.ranks ? secData.ranks[rank] : null;
    row.appendChild(buildCard(secCfg, rank, rData));
  });
  block.appendChild(row);

  const divEl = document.createElement('div');
  divEl.className = 'sec-divider';
  divEl.innerHTML = `<div class="sdl"></div><div class="sdd"></div><div class="sdl"></div>`;
  block.appendChild(divEl);

  return block;
}

// RENDER
function renderSections(data){
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  SECTIONS_CONFIG.forEach((cfg, i) => {
    const secData = data && data.sections ? data.sections[cfg.key] : null;
    const block = buildSection(cfg, secData);
    container.appendChild(block);
    setTimeout(() => block.classList.add('visible'), 120 * i + 60);
  });
}

// LOGO
function applyLogo(src){
  if(!src) return;
  const il = document.getElementById('intro-logo-inner');
  if(il) il.innerHTML = `<img src="${src}" alt="logo" onerror="this.outerHTML='<div class=logo-fallback-txt>RIZZ<br>LIVE</div>'">`;
  const hl = document.getElementById('hdr-logo-wrap');
  if(hl) hl.innerHTML = `<img src="${src}" alt="logo" onerror="this.outerHTML='<div class=hdr-logo-fallback>RIZZ<br>LIVE</div>'">`;
}

// LOAD DATA
async function loadData(){
  let data = null;
  try {
    const res = await fetch('./rizz-data.json?v=' + Date.now());
    if(res.ok){ const t = await res.text(); if(t && t.trim() !== '{}') data = JSON.parse(t); }
  } catch(e){}
  if(data && data.logo) applyLogo(data.logo);
  else { const img = new Image(); img.onload = () => applyLogo(img.src); img.src = './images/app_logo.png'; }
  renderSections(data);
}

// INTRO → MAIN
function enterMain(){
  const intro = document.getElementById('intro');
  const main  = document.getElementById('main');
  intro.classList.add('out');
  setTimeout(() => {
    intro.style.display = 'none';
    main.style.display  = 'block';
    startConfetti();
    loadData();
    window.scrollTo(0, 0);
  }, 900);
}
setTimeout(enterMain, 3200);

// PRELOAD
(function(){
  const img = new Image();
  img.onload = () => applyLogo(img.src);
  img.src = './images/app_logo.png';
  fetch('./rizz-data.json?v=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(d => { if(d && d.logo) applyLogo(d.logo); })
    .catch(() => {});
})();

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
