<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Live — Honour Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Italiana&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03020a;
  --bg2:#06041a;
  --card:#0b0920;
  --gold:#ffd700;
  --gold2:#ffe566;
  --gold3:#ffb300;
  --silver:#c8ccd8;
  --bronze:#cd7f32;
  --orange:#ff6b35;
  --pink:#ff3d7f;
  --cyan:#00e5ff;
  --accent:#b44fff;
  --text:#f5f3ff;
  --muted:#4a4870;
  --diamond:#b9f2ff;
}
html,body{background:var(--bg);min-height:100vh;overflow-x:hidden}
body{font-family:'Rajdhani',sans-serif;color:var(--text)}

/* ═══════════════════════════════════════════════
   INTRO PAGE
═══════════════════════════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  background:radial-gradient(ellipse at 50% 60%, #1a0635 0%, #0d0220 40%, #03020a 100%);
  transition:opacity 1.2s cubic-bezier(.4,0,.2,1), transform 1.4s cubic-bezier(.4,0,.2,1);
}
#intro.out{opacity:0;transform:scale(1.1) translateY(-40px);pointer-events:none}

.star-field{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:var(--op,.6);transform:scale(1.4)}}

#fw-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}

.intro-center{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

.intro-logo-wrap{
  position:relative;
  width:180px;height:180px;
  margin-bottom:12px;
}
.intro-logo-ring{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg, var(--gold3), var(--pink), var(--accent), var(--cyan), var(--gold3));
  padding:3px;
  animation:ringRotate 4s linear infinite;
  box-shadow:0 0 40px rgba(255,215,0,.4),0 0 80px rgba(255,215,0,.15);
}
@keyframes ringRotate{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}

.intro-logo-inner{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#16063a,#2e0c5c,#0f0430);
  display:flex;align-items:center;justify-content:center;
  border:4px solid #03020a;
}
.intro-logo-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.logo-fallback-txt{
  font-family:'Cinzel Decorative',cursive;
  font-size:18px;font-weight:900;color:var(--gold);
  text-align:center;line-height:1.3;
  text-shadow:0 0 20px rgba(255,215,0,.6);
}

.orbit-particle{
  position:absolute;
  width:6px;height:6px;border-radius:50%;
  top:50%;left:50%;margin:-3px;
}
.orbit-particle:nth-child(1){background:var(--gold);box-shadow:0 0 10px var(--gold);animation:orbit1 3s linear infinite;}
.orbit-particle:nth-child(2){background:var(--pink);box-shadow:0 0 10px var(--pink);animation:orbit1 5s linear infinite reverse;width:4px;height:4px;margin:-2px;}
.orbit-particle:nth-child(3){background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:orbit1 4s linear infinite .5s;width:5px;height:5px;margin:-2.5px;}
@keyframes orbit1{
  0%{transform:rotate(0deg) translateX(100px) rotate(0deg)}
  100%{transform:rotate(360deg) translateX(100px) rotate(-360deg)}
}

.intro-crown{
  font-size:52px;display:block;
  animation:crownBounce 2s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,215,0,.8));
  margin-bottom:8px;
}
@keyframes crownBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.08)}}

.honour-text{
  font-family:'Cinzel Decorative',cursive;
  font-size:42px;font-weight:900;letter-spacing:6px;
  background:linear-gradient(180deg, #fff9e6 0%, var(--gold) 35%, var(--gold3) 65%, #a06000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
  animation:honorGlow 2s ease-in-out infinite alternate;
  line-height:1.1;
}
@keyframes honorGlow{
  from{filter:drop-shadow(0 0 10px rgba(255,215,0,.5))}
  to{filter:drop-shadow(0 0 30px rgba(255,215,0,.9)) drop-shadow(0 0 60px rgba(255,180,0,.4))}
}

.wall-text{
  font-family:'Cinzel',serif;font-size:18px;font-weight:400;
  color:rgba(255,230,100,.6);letter-spacing:12px;margin-top:4px;
  text-transform:uppercase;animation:fadeInUp .8s ease 1s both;
}

.intro-tagline{
  font-size:11px;color:var(--muted);letter-spacing:4px;
  margin-top:14px;text-transform:uppercase;
  animation:fadeInUp .8s ease 1.4s both;
}

.intro-progress-wrap{
  width:200px;height:2px;background:rgba(255,255,255,.06);
  border-radius:2px;margin-top:24px;overflow:hidden;
  animation:fadeInUp .8s ease 1.6s both;
}
.intro-progress-bar{
  height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,var(--gold3),var(--gold),var(--gold2));
  box-shadow:0 0 8px var(--gold);
  animation:progressFill 3s linear 0.2s forwards;
}
@keyframes progressFill{from{width:0%}to{width:100%}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════════
   MAIN PAGE
═══════════════════════════════════════════════ */
#main{
  display:none;width:100%;max-width:540px;
  margin:0 auto;min-height:100vh;
  position:relative;z-index:1;padding-bottom:80px;
}

#confetti-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* HEADER */
.page-header{
  position:sticky;top:0;z-index:50;
  padding:10px 16px 10px;
  background:rgba(3,2,10,.88);
  backdrop-filter:blur(20px) saturate(200%);
  border-bottom:1px solid rgba(255,215,0,.1);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.page-header::after{
  content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.5),transparent);
}

.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo-wrap{
  width:38px;height:38px;border-radius:50%;overflow:hidden;
  border:1.5px solid var(--gold3);background:#16063a;
  box-shadow:0 0 12px rgba(255,180,0,.3);flex-shrink:0;
}
.hdr-logo-wrap img{width:100%;height:100%;object-fit:cover}
.hdr-logo-fallback{font-family:'Cinzel Decorative',cursive;font-size:6px;font-weight:900;color:var(--gold);text-align:center;padding-top:10px;line-height:1.4}
.hdr-brand{font-family:'Cinzel Decorative',cursive;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;line-height:1.2}
.hdr-sub{font-size:8px;color:var(--muted);letter-spacing:3px}

.hdr-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:4px;color:#fff;text-align:center;
}

.hdr-live{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,61,127,.08);border:1px solid rgba(255,61,127,.25);
  border-radius:20px;padding:5px 10px;flex-shrink:0;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:livePing 1.4s ease infinite}
@keyframes livePing{0%{box-shadow:0 0 0 0 rgba(255,61,127,.6)}70%{box-shadow:0 0 0 8px rgba(255,61,127,0)}100%{box-shadow:0 0 0 0 rgba(255,61,127,0)}}
.live-txt{font-size:9px;font-weight:700;color:var(--pink);letter-spacing:2px}

/* SECTION */
.section-block{
  opacity:0;transform:translateY(30px);
  transition:opacity .7s cubic-bezier(.2,.8,.2,1),transform .7s cubic-bezier(.2,.8,.2,1);
  padding-bottom:4px;
}
.section-block.visible{opacity:1;transform:translateY(0)}

.sec-header{text-align:center;padding:28px 16px 12px;}
.sec-emoji{font-size:28px;margin-bottom:6px;display:block;filter:drop-shadow(0 0 10px rgba(255,215,0,.5));}
.sec-title{
  font-family:'Cinzel',serif;font-size:15px;font-weight:700;
  color:var(--gold);letter-spacing:3px;text-transform:uppercase;
  text-shadow:0 0 20px rgba(255,215,0,.3);
}
.sec-week{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:4px;text-transform:uppercase;}
.sec-line{width:80px;height:1px;margin:10px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}

/* TOP 3 ROW */
.top3-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:8px;padding:8px 10px 16px;
}

/* ═══ CARDS ═══ */
.top-card{
  display:flex;flex-direction:column;align-items:center;
  border-radius:20px;padding:24px 8px 14px;
  position:relative;flex:1;max-width:160px;
  cursor:default;
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s;
  animation:cardIn .6s cubic-bezier(.2,.8,.2,1) both;
}
.top-card:hover{transform:translateY(-6px) scale(1.025)}

.top-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:rgba(255,255,255,.02);backdrop-filter:blur(10px);pointer-events:none;
}

/* ── RANK 1 = Diamond ── */
.top-card.rank1{
  background:linear-gradient(160deg,#0b1a2e 0%,#0d2545 40%,#071525 100%);
  border:1px solid rgba(100,220,255,.45);
  min-height:245px;
  box-shadow:
    0 8px 40px rgba(100,220,255,.18),
    0 0 0 1px rgba(100,220,255,.08),
    inset 0 1px 0 rgba(100,220,255,.18),
    0 0 60px rgba(0,200,255,.06);
}
/* Diamond shimmer top glow */
.rank1::after{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse at 50% -10%,rgba(100,220,255,.1) 0%,transparent 65%);
  pointer-events:none;
}

/* ── RANK 2 = Silver ── */
.top-card.rank2{
  background:linear-gradient(160deg,#0e0e22 0%,#181830 50%,#0e0e22 100%);
  border:1px solid rgba(200,204,216,.2);
  min-height:215px;
  box-shadow:0 6px 24px rgba(200,204,216,.07),inset 0 1px 0 rgba(200,204,216,.07);
}

/* ── RANK 3 = Bronze ── */
.top-card.rank3{
  background:linear-gradient(160deg,#120e0a 0%,#201408 50%,#120e0a 100%);
  border:1px solid rgba(205,127,50,.25);
  min-height:215px;
  box-shadow:0 6px 24px rgba(205,127,50,.06),inset 0 1px 0 rgba(205,127,50,.06);
}

/* Crown */
.rank1 .crown-ico{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:26px;
  filter:drop-shadow(0 0 12px rgba(100,220,255,.9));
  animation:crownFloat 2.5s ease-in-out infinite;
}
@keyframes crownFloat{
  0%,100%{transform:translateX(-50%) translateY(0) rotate(-4deg)}
  50%{transform:translateX(-50%) translateY(-8px) rotate(4deg)}
}

/* Rank badge */
.rank-badge{
  position:absolute;top:-10px;right:12px;
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:13px;z-index:2;
}
.rank1 .rank-badge{
  background:linear-gradient(135deg,#b9f2ff,#4dd8f0,#0090aa);
  color:#001a22;
  box-shadow:0 2px 12px rgba(77,216,240,.6);
}
.rank2 .rank-badge{background:linear-gradient(135deg,#eceff8,#b0b4c8,#7a7e8e);color:#0a0a1a;box-shadow:0 2px 8px rgba(180,184,210,.4)}
.rank3 .rank-badge{background:linear-gradient(135deg,#e8a060,#b06830,#7a3e10);color:#fff8f0;box-shadow:0 2px 8px rgba(180,100,40,.4)}

/* DP */
.dp-wrap{position:relative;margin:10px auto 8px;}
.dp-wrap.big{width:88px;height:88px}
.dp-wrap.sm{width:72px;height:72px}

.dp-img-circle{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#2a1a4a,#1a1830);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.dp-img-circle img{width:100%;height:100%;object-fit:cover}
.dp-no-img{font-size:10px;color:#333;text-align:center;line-height:1.3}

.rank1 .dp-img-circle{
  border:3px solid #4dd8f0;
  box-shadow:0 0 0 3px rgba(77,216,240,.12),0 0 28px rgba(77,216,240,.3);
}
.rank2 .dp-img-circle{border:2.5px solid var(--silver);box-shadow:0 0 0 2px rgba(200,204,216,.08),0 0 14px rgba(200,204,216,.12)}
.rank3 .dp-img-circle{border:2.5px solid var(--bronze);box-shadow:0 0 0 2px rgba(205,127,50,.08),0 0 14px rgba(205,127,50,.12)}

/* Frame overlay */
.dp-frame{
  position:absolute;inset:-12px;
  width:calc(100% + 24px);height:calc(100% + 24px);
  pointer-events:none;object-fit:contain;z-index:3;
}

/* Dashed ring fallback */
.dp-ring{
  position:absolute;inset:-7px;border-radius:50%;
  border:1.5px dashed currentColor;opacity:.3;
  animation:spinRing 12s linear infinite;pointer-events:none;
}
.rank1 .dp-ring{color:#4dd8f0;opacity:.6}
.rank2 .dp-ring{color:var(--silver)}
.rank3 .dp-ring{color:var(--bronze)}
@keyframes spinRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════
   TIER LABEL (Diamond / Silver / Bronze)
   Premium badge below DP
═══════════════════════════════════════════════ */
.tier-label{
  display:flex;align-items:center;gap:5px;
  border-radius:30px;
  padding:4px 10px 4px 7px;
  margin-bottom:6px;
  position:relative;
  overflow:hidden;
}

/* shimmer sweep */
.tier-label::after{
  content:'';
  position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  animation:tierShimmer 2.4s linear infinite;
  pointer-events:none;
}
@keyframes tierShimmer{0%{left:-60%}100%{left:130%}}

/* ── Diamond tier ── */
.tier-diamond{
  background:linear-gradient(135deg,#001824 0%,#002a3a 50%,#001824 100%);
  border:1px solid rgba(100,220,255,.5);
  box-shadow:0 0 14px rgba(100,220,255,.2),inset 0 1px 0 rgba(100,220,255,.1);
}
.tier-diamond .tier-txt{
  font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(90deg,#b9f2ff,#4dd8f0,#00bcd4,#b9f2ff);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:diamondTextFlow 3s linear infinite;
}
@keyframes diamondTextFlow{0%{background-position:0%}100%{background-position:200%}}

/* ── Silver tier ── */
.tier-silver{
  background:linear-gradient(135deg,#141420 0%,#1e1e30 50%,#141420 100%);
  border:1px solid rgba(200,204,216,.35);
  box-shadow:0 0 10px rgba(200,204,216,.08),inset 0 1px 0 rgba(200,204,216,.08);
}
.tier-silver .tier-txt{
  font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(90deg,#eceff8,#c8ccd8,#90949e,#c8ccd8,#eceff8);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:diamondTextFlow 3s linear infinite;
}

/* ── Bronze tier ── */
.tier-bronze{
  background:linear-gradient(135deg,#1a1008 0%,#251808 50%,#1a1008 100%);
  border:1px solid rgba(205,127,50,.4);
  box-shadow:0 0 10px rgba(205,127,50,.08),inset 0 1px 0 rgba(205,127,50,.08);
}
.tier-bronze .tier-txt{
  font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(90deg,#e8a060,#cd7f32,#a05020,#cd7f32,#e8a060);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:diamondTextFlow 3s linear infinite;
}

/* Name */
.card-name{
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;
  color:#ede8ff;text-align:center;
  word-break:break-word;max-width:140px;
  line-height:1.35;margin-bottom:9px;
}
.rank1 .card-name{font-size:13px;color:#fff}

/* ═══════════════════════════════════════════════
   RUBY TARGET ROW  (icon + label + value)
═══════════════════════════════════════════════ */
.stat-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:6px 8px;width:100%;
}
.stat-body{display:flex;flex-direction:column;min-width:0;flex:1}
.stat-label{font-size:7px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.stat-val{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank1 .stat-val{font-size:12px}

/* Divider */
.sec-divider{display:flex;align-items:center;gap:8px;margin:0 20px 10px;}
.sdl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.15),transparent)}
.sdd{width:3px;height:3px;border-radius:50%;background:rgba(255,215,0,.3)}

/* Card entrance */
@keyframes cardIn{
  from{opacity:0;transform:translateY(35px) scale(.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.top3-row .top-card.rank2{animation-delay:.05s}
.top3-row .top-card.rank1{animation-delay:.12s}
.top3-row .top-card.rank3{animation-delay:.18s}

/* FOOTER */
.page-footer{
  text-align:center;padding:28px 16px 24px;
  border-top:1px solid rgba(255,255,255,.04);position:relative;
}
.page-footer::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.3),transparent);
}
.footer-brand{
  font-family:'Cinzel Decorative',cursive;font-size:8px;font-weight:700;
  color:rgba(255,215,0,.15);letter-spacing:4px;margin-bottom:10px;
}
.india-flag{display:flex;align-items:center;justify-content:center;gap:2px}
.fs{width:22px;height:5px;border-radius:1px}

/* Loading */
#loading-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 20px;gap:14px;
}
.loading-spinner{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(255,255,255,.06);border-top-color:var(--gold);
  animation:spinRing 1s linear infinite;
}
.loading-txt{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

/* BG glows */
.bg-glow{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.bg-glow1{width:500px;height:500px;background:radial-gradient(circle,rgba(180,79,255,.04) 0%,transparent 70%);top:-100px;right:-150px;animation:bgFloat 10s ease-in-out infinite}
.bg-glow2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,53,.03) 0%,transparent 70%);bottom:100px;left:-100px;animation:bgFloat 14s ease-in-out infinite 2s}
@keyframes bgFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}

@media(max-width:360px){
  .honour-text{font-size:32px}
  .top-card.rank1{min-height:220px}
  .top-card.rank2,.top-card.rank3{min-height:200px}
}
</style>
</head>
<body>

<canvas id="fw-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- ═══ INTRO ═══ -->
<div id="intro">
  <div class="star-field" id="star-field"></div>
  <div class="intro-center">
    <span class="intro-crown">👑</span>
    <div class="intro-logo-wrap">
      <div class="intro-logo-ring">
        <div class="intro-logo-inner" id="intro-logo-inner">
          <div class="logo-fallback-txt">RIZZ<br>LIVE</div>
        </div>
      </div>
      <div class="orbit-particle"></div>
      <div class="orbit-particle"></div>
      <div class="orbit-particle"></div>
    </div>
    <div class="honour-text">HONOUR</div>
    <div class="honour-text" style="font-size:30px;letter-spacing:12px;margin-top:-4px">WALL</div>
    <div class="intro-tagline">🇮🇳 &nbsp; India's #1 Live Platform &nbsp; 🇮🇳</div>
    <div class="intro-progress-wrap">
      <div class="intro-progress-bar" id="intro-progress"></div>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main">
  <div class="bg-glow bg-glow1"></div>
  <div class="bg-glow bg-glow2"></div>

  <div class="page-header">
    <div class="hdr-left">

<script>
// ════ STAR FIELD ════
(function(){
  const sf=document.getElementById('star-field');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+.5;

    sf.appendChild(s);

})();

// ════ FIREWORKS ════
(function(){
  const canvas=document.getElementById('fw-canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const particles=[],rockets=[];
  function rand(a,b){return Math.random()*(b-a)+a}
  class Rocket{
    constructor(){this.reset()}
    reset(){
      this.x=rand(W*.2,W*.8);this.y=H;
      this.vy=rand(-14,-10);this.vx=rand(-1.5,1.5);
      this.target=rand(H*.15,H*.45);this.hue=rand(0,360);
      this.exploded=false;this.trail=[];this.alpha=1;
    }
    update(){
      if(this.exploded)return false;
      this.trail.push({x:this.x,y:this.y,a:this.alpha});
      if(this.trail.length>8)this.trail.shift();
      this.x+=this.vx;this.y+=this.vy;this.vy+=.3;
      if(this.y<=this.target||this.vy>=0){this.explode();return false;}
      return true;
    }
    explode(){
      const count=rand(60,100)|0;
      for(let i=0;i<count;i++){
        const angle=rand(0,Math.PI*2),speed=rand(1.5,7);
        particles.push({x:this.x,y:this.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,hue:this.hue+rand(-20,20),alpha:1,life:1,r:rand(1.5,3),gravity:.12});
      }
      for(let i=0;i<20;i++){
        const angle=(i/20)*Math.PI*2;
        particles.push({x:this.x,y:this.y,vx:Math.cos(angle)*rand(3,5),vy:Math.sin(angle)*rand(3,5),hue:this.hue+180,alpha:1,life:1,r:1.2,gravity:.08});
      }
      this.exploded=true;
    }
    draw(){
      this.trail.forEach((t,i)=>{
        ctx.beginPath();ctx.arc(t.x,t.y,1.5*(i/this.trail.length),0,Math.PI*2);
        ctx.fillStyle=`hsla(${this.hue},90%,70%,${t.a*(i/this.trail.length)})`;ctx.fill();
      });
      ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);
      ctx.fillStyle=`hsl(${this.hue},90%,80%)`;ctx.fill();
    }
  }
  let lastRocket=0;
  function animate(){
    ctx.fillStyle='rgba(3,2,10,.18)';ctx.fillRect(0,0,W,H);
    const now=Date.now();
    if(now-lastRocket>rand(300,700)){rockets.push(new Rocket());lastRocket=now;}
    for(let i=rockets.length-1;i>=0;i--){const r=rockets[i];r.draw();if(!r.update())rockets.splice(i,1);}
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.97;p.life-=.014;p.alpha=p.life;
      if(p.life<=0){particles.splice(i,1);continue}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},90%,65%,${p.alpha})`;ctx.fill();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// ════ CONFETTI ════
let confettiActive=false;
function startConfetti(){
  confettiActive=true;
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const COLORS=['#ffd700','#ff6b35','#ff3d7f','#b44fff','#00e5ff','#ffffff','#ff9933','#138808','#ffec6e'];
  const bits=[];
  for(let i=0;i<120;i++){
    bits.push({
      x:Math.random()*W,y:Math.random()*H-H,
      w:Math.random()*8+4,h:Math.random()*5+2,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      angle:Math.random()*360,spin:Math.random()*3-1.5,
      vy:Math.random()*2+1.2,vx:Math.random()*1.2-.6,
      opacity:Math.random()*.6+.4,wobble:Math.random()*Math.PI*2,
      wobbleSpeed:Math.random()*.05+.01
    });
  }
  function draw(){
    if(!confettiActive)return;
    ctx.clearRect(0,0,W,H);
    bits.forEach(b=>{
      b.y+=b.vy;b.x+=b.vx+Math.sin(b.wobble)*.4;
      b.angle+=b.spin;b.wobble+=b.wobbleSpeed;
      if(b.y>H+20){b.y=-20;b.x=Math.random()*W}
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.angle*Math.PI/180);
      ctx.globalAlpha=b.opacity;ctx.fillStyle=b.color;
      const r=1,rx=-b.w/2,ry=-b.h/2;
      ctx.beginPath();
      ctx.moveTo(rx+r,ry);ctx.lineTo(rx+b.w-r,ry);ctx.quadraticCurveTo(rx+b.w,ry,rx+b.w,ry+r);
      ctx.lineTo(rx+b.w,ry+b.h-r);ctx.quadraticCurveTo(rx+b.w,ry+b.h,rx+b.w-r,ry+b.h);
      ctx.lineTo(rx+r,ry+b.h);ctx.quadraticCurveTo(rx,ry+b.h,rx,ry+b.h-r);
      ctx.lineTo(rx,ry+r);ctx.quadraticCurveTo(rx,ry,rx+r,ry);
      ctx.closePath();ctx.fill();ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

//  CONFIG
//  stat.type controls icon + label per section
// ════════════════════════════════════════════════
const SECTIONS_CONFIG=[
  {key:'agency',     emoji:'🏆', title:'Top 3 Agency',
   stat:{label:'Ruby Target', type:'ruby'}},
  {key:'host',       emoji:'🎤', title:'Top 3 Host',
   stat:{label:'Ruby Target', type:'ruby'}},
  {key:'recharger',  emoji:'💰', title:'Top 3 Recharger',
   stat:{label:'Weekly Recharge', type:'coin'}},
  {key:'gifter',     emoji:'🎁', title:'Top 3 Gifter',
   stat:{label:'Ruby', type:'ruby'}},          // ← sirf "Ruby" label
  {key:'activehost', emoji:'🔴', title:'Top 3 Active Host',
   stat:{label:'Most of Time', type:'clock'}}, // ← clock + "Most of Time"
  {key:'newagency',  emoji:'🌟', title:'New Top 3 Agency',
   stat:{label:'Ruby Target', type:'ruby'}},
  {key:'agencytime', emoji:'⏱', title:'Top 3 Agency App Time',
   stat:{label:'Most of Time', type:'clock'}}, // ← clock + "Most of Time"
];

const RANK_META={
  1:{tier:'diamond', tierLabel:'💎 Diamond', tierClass:'tier-diamond', sz:'big'},
  2:{tier:'silver',  tierLabel:'🥈 Silver',  tierClass:'tier-silver',  sz:'sm'},
  3:{tier:'bronze',  tierLabel:'🥉 Bronze',  tierClass:'tier-bronze',  sz:'sm'},
};
const DISPLAY_ORDER=[2,1,3];

// ════ SVG ICONS ════
function redDiamondSVG(s=15){
  return `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="rdg_${s}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff6b6b"/>
        <stop offset="40%" stop-color="#ff1744"/>
        <stop offset="100%" stop-color="#7b0026"/>
      </linearGradient>
      <linearGradient id="rdh_${s}" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ff8a80" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#ff1744" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- Main diamond shape -->
    <polygon points="16,2 28,12 16,30 4,12" fill="url(#rdg_${s})"/>
    <!-- Top highlight facet -->
    <polygon points="16,2 22,12 16,10 10,12" fill="url(#rdh_${s})" opacity="0.7"/>
    <!-- Left dark facet -->
    <polygon points="4,12 16,10 16,30" fill="#7b0026" opacity="0.45"/>
    <!-- Right mid facet -->
    <polygon points="28,12 16,10 16,30" fill="#c0002a" opacity="0.3"/>
    <!-- Bright center shine -->
    <ellipse cx="14" cy="9" rx="3" ry="2" fill="#fff" opacity="0.22" transform="rotate(-20,14,9)"/>
  </svg>`;
}

function coinSVG(s=15){
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24">
    <defs><radialGradient id="cg${s}" cx="38%" cy="33%">
      <stop offset="0%" stop-color="#fff5c0"/>
      <stop offset="55%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#a07000"/>
    </radialGradient></defs>
    <circle cx="12" cy="12" r="10.5" fill="url(#cg${s})" stroke="#a0700020" stroke-width=".5"/>
    <text x="12" y="16.5" text-anchor="middle" font-size="9" font-weight="700" fill="#7a5c00" font-family="serif">₹</text>
  </svg>`;
}

function clockSVG(s=15){
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#00e5ff" stroke-width="1.3"/>
    <circle cx="12" cy="12" r="1.3" fill="#00e5ff"/>
    <line x1="12" y1="12" x2="12" y2="5.5" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="16.5" y2="14.5" stroke="#00bcd4" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`;
}

function getIcon(type,s=15){
  if(type==='ruby') return redDiamondSVG(s);
  if(type==='coin') return coinSVG(s);
  if(type==='clock')return clockSVG(s);
  return redDiamondSVG(s);
}

function getStatColor(type){
  if(type==='ruby') return '#ff3d7f';
  if(type==='coin') return '#ffd700';
  if(type==='clock')return '#00e5ff';
  return '#ff3d7f';
}

// ════ BUILD CARD ════
function buildCard(secCfg,rank,rData){
  const rm=RANK_META[rank];
  const d=rData||{};
  const name=d.name||'— — —';
  const stat=d.stat||'—';
  const dp=d.dp||'';
  const frame=d.frame||'';

  const card=document.createElement('div');
  card.className=`top-card rank${rank}`;

  const dpHTML=dp
    ?`<img src="${esc(dp)}" alt="${esc(name)}" onerror="this.style.display='none'">`
    :`<div class="dp-no-img">NO<br>DP</div>`;

  const frameHTML=frame
    ?`<img class="dp-frame" src="${esc(frame)}" alt="" onerror="this.remove()">`
    :`<div class="dp-ring"></div>`;

  const crownHTML=rank===1?`<span class="crown-ico">💎</span>`:'';

  const statColor=getStatColor(secCfg.stat.type);

  card.innerHTML=`
    ${crownHTML}
    <span class="rank-badge">${rank}</span>

    <div class="dp-wrap ${rm.sz}">
      <div class="dp-img-circle">${dpHTML}</div>
      ${frameHTML}
    </div>

    <!-- Premium Tier Label -->
    <div class="tier-label ${rm.tierClass}">
      <span class="tier-txt">${rm.tierLabel}</span>
    </div>

    <div class="card-name">${esc(name)}</div>

    <!-- Ruby / Coin / Clock stat -->
    <div class="stat-chip">
      <div>${getIcon(secCfg.stat.type,14)}</div>
      <div class="stat-body">
        <span class="stat-label">${secCfg.stat.label}</span>
        <span class="stat-val" style="color:${statColor}">${esc(stat)}</span>
      </div>
    </div>`;

  return card;
}

// ════ BUILD SECTION ════
function buildSection(secCfg,secData){
  const week=(secData&&secData.week)?secData.week:'Week 1st';
  const block=document.createElement('div');
  block.className='section-block';

  const hdr=document.createElement('div');
  hdr.className='sec-header';
  hdr.innerHTML=`
    <span class="sec-emoji">${secCfg.emoji}</span>
    <div class="sec-title">${secCfg.title}</div>
    <div class="sec-week">${esc(week)}</div>
    <div class="sec-line"></div>`;
  block.appendChild(hdr);

  const row=document.createElement('div');
  row.className='top3-row';
  DISPLAY_ORDER.forEach(rank=>{
    const rData=secData&&secData.ranks?secData.ranks[rank]:null;
    row.appendChild(buildCard(secCfg,rank,rData));
  });
  block.appendChild(row);

  const div=document.createElement('div');
  div.className='sec-divider';
  div.innerHTML=`<div class="sdl"></div><div class="sdd"></div><div class="sdl"></div>`;
  block.appendChild(div);

  return block;
}

// ════ RENDER SECTIONS ════
function renderSections(data){
  const container=document.getElementById('sections-container');
  container.innerHTML='';
  SECTIONS_CONFIG.forEach((cfg,i)=>{
    const secData=data&&data.sections?data.sections[cfg.key]:null;
    const block=buildSection(cfg,secData);
    container.appendChild(block);
    setTimeout(()=>block.classList.add('visible'),120*i+60);
  });
}

// ════ LOGO ════
function applyLogo(src){
  if(!src)return;
  const il=document.getElementById('intro-logo-inner');
  if(il)il.innerHTML=`<img src="${src}" alt="logo" onerror="this.outerHTML='<div class=logo-fallback-txt>RIZZ<br>LIVE</div>'">`;
  const hl=document.getElementById('hdr-logo-wrap');
  if(hl)hl.innerHTML=`<img src="${src}" alt="logo" onerror="this.outerHTML='<div class=hdr-logo-fallback>RIZZ<br>LIVE</div>'">`;
}

// ════ LOAD DATA ════
async function loadData(){
  let data=null;
  try{
    const res=await fetch('./rizz-data.json?v='+Date.now());
    if(res.ok){const t=await res.text();if(t&&t.trim()!=='{}')data=JSON.parse(t);}
  }catch(e){}
  if(data&&data.logo)applyLogo(data.logo);
  else{const img=new Image();img.onload=()=>applyLogo(img.src);img.src='./images/app_logo.png';}
  renderSections(data);
}

// ════ INTRO → MAIN ════
function enterMain(){
  const intro=document.getElementById('intro');
  const main=document.getElementById('main');
  intro.classList.add('out');
  setTimeout(()=>{
    intro.style.display='none';
    main.style.display='block';
    startConfetti();
    loadData();
    window.scrollTo(0,0);
  },900);
}
setTimeout(enterMain,3200);

// ════ PRELOAD LOGO ════
(function(){
  const img=new Image();
  img.onload=()=>applyLogo(img.src);
  img.src='./images/app_logo.png';
  fetch('./rizz-data.json?v='+Date.now())
    .then(r=>r.ok?r.json():null)
    .then(d=>{if(d&&d.logo)applyLogo(d.logo);})
    .catch(()=>{});
})();

// ════ UTIL ════
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
